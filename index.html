<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EK Signal Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── DARK THEME (default) ── */
:root{
  --bg:#080a0f;--s1:#0f1219;--s2:#161b27;--s3:#1e2435;
  --b1:#252d42;--b2:#2e3850;
  --t1:#e8edf8;--t2:#8892a4;--t3:#4a5568;
  --shadow:rgba(0,0,0,.4);
  --gr:#00c896;--rd:#ff3d5a;--yl:#f5c542;--bl:#4d9eff;--pu:#a78bfa;--or:#ff8c42;
  --gr-dim:rgba(0,200,150,.12);--rd-dim:rgba(255,61,90,.12);
  --yl-dim:rgba(245,197,66,.12);--bl-dim:rgba(77,158,255,.12);--pu-dim:rgba(167,139,250,.12);
  --font-ui:'Syne',sans-serif;--font-mono:'JetBrains Mono',monospace;
}
/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f0f3fa;--s1:#ffffff;--s2:#f5f7fc;--s3:#eaeef8;
  --b1:#d6dce8;--b2:#c4ccd8;
  --t1:#141825;--t2:#5a6278;--t3:#9aa0b0;
  --shadow:rgba(0,0,0,.1);
  --gr:#009e76;--rd:#e0203c;--yl:#c89500;--bl:#1a7de0;--pu:#7c5ce4;--or:#d4621a;
  --gr-dim:rgba(0,158,118,.1);--rd-dim:rgba(224,32,60,.1);
  --yl-dim:rgba(200,149,0,.1);--bl-dim:rgba(26,125,224,.1);--pu-dim:rgba(124,92,228,.1);
}

body{background:var(--bg);color:var(--t1);font-family:var(--font-ui);font-size:14px;height:100vh;overflow:hidden;transition:background .2s,color .2s}

/* ── LAYOUT ── */
.app{display:flex;height:100vh}
.sidebar{width:224px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0;transition:background .2s,border-color .2s}
.main{flex:1;overflow-y:auto;background:var(--bg)}
.main-inner{padding:28px 32px;min-height:100%}

/* ── SIDEBAR ── */
.logo{padding:18px 22px 14px;font-size:15px;font-weight:800;letter-spacing:.08em;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--gr);box-shadow:0 0 8px var(--gr);flex-shrink:0}
.nav{flex:1;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 22px;cursor:pointer;color:var(--t2);transition:all .15s;border-left:2px solid transparent;font-size:13px;font-weight:600}
.nav-item:hover{color:var(--t1);background:var(--s2)}
.nav-item.active{color:var(--t1);background:var(--s2);border-left-color:var(--bl)}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--bl);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.sidebar-footer{padding:12px 22px;border-top:1px solid var(--b1);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.conn-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.conn-dot.ok{background:var(--gr)}.conn-dot.err{background:var(--rd)}
.footer-text{font-size:11px;color:var(--t3);flex:1}
.theme-btn{background:var(--s2);border:1px solid var(--b1);color:var(--t2);font-size:14px;width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.theme-btn:hover{color:var(--t1);border-color:var(--b2)}

/* ── PAGE HEADER ── */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.ph-title{font-size:20px;font-weight:800;letter-spacing:.02em}
.ph-sub{font-size:12px;color:var(--t2);margin-top:2px}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:16px 18px;transition:background .2s,border-color .2s}
.stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);margin-bottom:8px}
.stat-val{font-size:22px;font-weight:800;font-family:var(--font-mono);letter-spacing:-.02em}
.stat-sub{font-size:11px;color:var(--t2);margin-top:4px}
.stat-val.gr{color:var(--gr)}.stat-val.rd{color:var(--rd)}.stat-val.bl{color:var(--bl)}.stat-val.yl{color:var(--yl)}

/* ── CARD ── */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;margin-bottom:16px;overflow:hidden;transition:background .2s,border-color .2s}
.card-head{padding:13px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t2)}
.card-body{padding:18px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:var(--s2);color:var(--t3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:10px 14px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--b1)}
td{padding:10px 14px;border-bottom:1px solid var(--b1);vertical-align:middle;font-size:13px}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--s2);transition:background .1s}
.mono{font-family:var(--font-mono);font-size:12px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap}
.bg{background:var(--gr-dim);color:var(--gr)}.br{background:var(--rd-dim);color:var(--rd)}
.by{background:var(--yl-dim);color:var(--yl)}.bb{background:var(--bl-dim);color:var(--bl)}
.bp{background:var(--pu-dim);color:var(--pu)}.bgr{background:var(--s3);color:var(--t2)}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:700;transition:all .15s;font-family:var(--font-ui);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}.btn:active{transform:none}
.btn-pr{background:var(--bl);color:#fff}.btn-gr{background:var(--gr);color:#000}
.btn-rd{background:var(--rd);color:#fff}.btn-gh{background:var(--s2);color:var(--t1);border:1px solid var(--b1)}
.btn-sm{padding:5px 11px;font-size:11px}

/* ── FORMS ── */
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t2);margin-bottom:5px}
input,select,textarea{background:var(--s2);border:1px solid var(--b1);color:var(--t1);padding:9px 12px;border-radius:7px;width:100%;font-size:13px;font-family:var(--font-ui);transition:border .15s,background .2s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--bl)}
select option{background:var(--s1)}
.input-hint{font-size:10px;color:var(--t3);margin-top:4px}
.gr2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.gr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.gr4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:14px;width:640px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px var(--shadow);transition:background .2s}
.modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--s1);z-index:1}
.modal-title{font-size:16px;font-weight:800}
.modal-close{background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer;line-height:1;padding:2px 6px;border-radius:4px}
.modal-close:hover{color:var(--t1);background:var(--s2)}
.modal-body{padding:20px 24px}
.modal-foot{padding:14px 24px;border-top:1px solid var(--b1);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--s1)}

/* ── ALERTS ── */
.alert{padding:11px 15px;border-radius:8px;font-size:13px;margin-bottom:14px;line-height:1.5}
.al-info{background:var(--bl-dim);border:1px solid rgba(77,158,255,.2);color:var(--bl)}
.al-warn{background:var(--yl-dim);border:1px solid rgba(245,197,66,.2);color:var(--yl)}
.al-danger{background:var(--rd-dim);border:1px solid rgba(255,61,90,.2);color:var(--rd)}
.al-success{background:var(--gr-dim);border:1px solid rgba(0,200,150,.2);color:var(--gr)}

/* ── MISC ── */
.gr-text{color:var(--gr)}.rd-text{color:var(--rd)}.yl-text{color:var(--yl)}.bl-text{color:var(--bl)}.dim{color:var(--t2)}
.flex{display:flex}.gap1{gap:4px}.gap2{gap:8px}.gap3{gap:12px}.ai{align-items:center}.jb{justify-content:space-between}.fw{flex-wrap:wrap}
.empty{text-align:center;padding:48px;color:var(--t3);font-size:13px}
.tag{display:inline-flex;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;background:var(--s3);color:var(--t2);letter-spacing:.04em}
.platform-tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--s3);color:var(--t1)}
.divider{border:none;border-top:1px solid var(--b1);margin:14px 0}
.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--b1)}

/* ── POTENZIALE CARD ── */
.pot-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.pot-item{background:var(--s2);border-radius:8px;padding:12px}
.pot-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:4px}
.pot-val{font-size:15px;font-weight:700;font-family:var(--font-mono)}

/* ── SETUP ── */
.setup-wrap{max-width:580px;margin:0 auto}
.step-list{counter-reset:step;list-style:none}
.step-list li{counter-increment:step;display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--b1);color:var(--t2);font-size:13px;line-height:1.5}
.step-list li::before{content:counter(step);background:var(--bl);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.step-list li:last-child{border-bottom:none}
code{background:var(--s3);padding:2px 6px;border-radius:4px;font-family:var(--font-mono);font-size:11px;color:var(--yl)}

@media(max-width:768px){
  .sidebar{width:56px}.nav-item span,.nav-badge,.logo span,.footer-text{display:none}
  .main-inner{padding:16px}.gr3,.gr4{grid-template-columns:1fr 1fr}.stats-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════
const PLATFORMS = ['TradeZero','IBKR','Degiro','Fineco'];
const TAX_RATE  = 0.26;
const FINECO    = 'Fineco';

const STATI = {
  ricevuto:    {l:'Ricevuto',   cls:'bgr', ic:'📨'},
  attivato:    {l:'Attivato',   cls:'by',  ic:'⚡'},
  aperto:      {l:'Aperto',     cls:'bb',  ic:'📈'},
  chiuso_tp:   {l:'TP ✓',      cls:'bg',  ic:'✅'},
  chiuso_stop: {l:'Stop Loss',  cls:'br',  ic:'🛑'},
  chiuso_man:  {l:'Chiuso',     cls:'bp',  ic:'🔒'},
  scartato:    {l:'Scartato',   cls:'bgr', ic:'✕'},
};
const CHIUSI = new Set(['chiuso_tp','chiuso_stop','chiuso_man']);

// ════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════
let S = {
  tab:      'dashboard',
  theme:    localStorage.getItem('ek_theme') || 'dark',
  gasUrl:   localStorage.getItem('ek_gas')   || '',
  signals:  JSON.parse(localStorage.getItem('ek_segnali') || '[]'),
  trades:   JSON.parse(localStorage.getItem('ek_trades')  || '[]'),
  loading:  false,
  modal:    null,
  filterSeg:'tutti',
  lastSync: localStorage.getItem('ek_sync') || null,
  syncErr:  null,
};
document.documentElement.setAttribute('data-theme', S.theme);

// ════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════
const uid   = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const today = () => new Date().toISOString().split('T')[0];
const nn    = v  => (v == null || v === '') ? null : Number(v);
const fmt   = (n, d=2) => n == null || n === '' ? '—' : Number(n).toFixed(d);
const fmtPct= n  => n == null ? '—' : (Number(n)>=0?'+':'')+Number(n).toFixed(2)+'%';
const fmtEur= n  => n == null ? '—' : (Number(n)>=0?'+':'')+Number(n).toFixed(2)+'€';
const fmtDate=d  => d ? new Date(d+'T12:00:00').toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit'}) : '—';
const esc   = s  => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function persist() {
  localStorage.setItem('ek_segnali', JSON.stringify(S.signals));
  localStorage.setItem('ek_trades',  JSON.stringify(S.trades));
}

// ════════════════════════════════════════════════════
// P&L CORE LOGIC (percentuale su EUR investiti)
// ════════════════════════════════════════════════════

// Ritorna la % di movimento da entry a targetPrice
function movePct(dir, entry, targetPrice) {
  if (!entry || !targetPrice) return null;
  return dir === 'BUY'
    ? (targetPrice - entry) / entry * 100
    : (entry - targetPrice) / entry * 100;
}

// P&L lordo in EUR: investito_eur * % spostamento - commissioni
function calcPL_EUR(dir, entryUSD, exitUSD, investitoEUR, commEUR) {
  if (!entryUSD || !exitUSD || !investitoEUR) return null;
  const pct = movePct(dir, entryUSD, exitUSD) / 100;
  return investitoEUR * pct - (commEUR || 0);
}

function calcTax(plEur, platform) {
  if (platform === FINECO || !plEur || plEur <= 0) return 0;
  return plEur * TAX_RATE;
}

// ════════════════════════════════════════════════════
// GAS SYNC
// ════════════════════════════════════════════════════
async function gasRead() {
  if (!S.gasUrl) return;
  S.loading = true; S.syncErr = null; render();
  try {
    const r = await fetch(S.gasUrl + '?action=read');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    if (Array.isArray(d.signals)) S.signals = d.signals;
    if (Array.isArray(d.trades))  S.trades  = d.trades;
    S.lastSync = new Date().toISOString();
    localStorage.setItem('ek_sync', S.lastSync);
    persist();
  } catch(e) { S.syncErr = e.message; }
  finally { S.loading = false; render(); }
}

async function gasWrite(type, op, record) {
  if (!S.gasUrl) return;
  try {
    const p = encodeURIComponent(JSON.stringify(record));
    await fetch(`${S.gasUrl}?action=write&type=${type}&op=${op}&record=${p}`);
  } catch {}
}

// ════════════════════════════════════════════════════
// DATA OPS
// ════════════════════════════════════════════════════
function addSignal(data) {
  const sig = { id:uid(), created:new Date().toISOString(), stato:'ricevuto', ...data };
  S.signals.unshift(sig); persist(); gasWrite('signal','add',sig); render();
}
function updSig(id, patch) {
  const i = S.signals.findIndex(s=>s.id===id); if(i<0) return;
  S.signals[i] = { ...S.signals[i], ...patch, updated:new Date().toISOString() };
  persist(); gasWrite('signal','update',S.signals[i]); render();
}
function addTrade(data) {
  const t = { id:uid(), created:new Date().toISOString(), stato:'aperto', ...data };
  S.trades.unshift(t); persist(); gasWrite('trade','add',t); render();
}
function updTrade(id, patch) {
  const i = S.trades.findIndex(t=>t.id===id); if(i<0) return;
  S.trades[i] = { ...S.trades[i], ...patch, updated:new Date().toISOString() };
  persist(); gasWrite('trade','update',S.trades[i]); render();
}

// ════════════════════════════════════════════════════
// COMPUTED
// ════════════════════════════════════════════════════
const openTrades   = () => S.trades.filter(t=>t.stato==='aperto');
const closedTrades = () => S.trades.filter(t=>CHIUSI.has(t.stato));

function totalPL()  { return closedTrades().reduce((s,t)=>s+(nn(t.pl_lordo)||0), 0); }
function totalTax() { return closedTrades().reduce((s,t)=>s+(nn(t.tasse)||0), 0); }

function summaryByPlatform() {
  const r = {};
  PLATFORMS.forEach(p => r[p] = {pl:0,gains:0,losses:0,trades:0,wins:0});
  closedTrades().forEach(t => {
    const p = t.piattaforma||''; if (!r[p]) return;
    const pl = nn(t.pl_lordo)||0;
    r[p].pl += pl; r[p].trades++;
    if (pl > 0) { r[p].gains += pl; r[p].wins++; }
    else if (pl < 0) r[p].losses += pl;
  });
  return r;
}

// ════════════════════════════════════════════════════
// THEME
// ════════════════════════════════════════════════════
function toggleTheme() {
  S.theme = S.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('ek_theme', S.theme);
  document.documentElement.setAttribute('data-theme', S.theme);
  render();
}

// ════════════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════════════
function openM(type, data={}) { S.modal={type,data}; render(); }
function closeM() { S.modal=null; render(); }

// ════════════════════════════════════════════════════
// UI HELPERS
// ════════════════════════════════════════════════════
function badge(stato) {
  const s = STATI[stato]||STATI.ricevuto;
  return `<span class="badge ${s.cls}">${s.ic} ${s.l}</span>`;
}
function dirBadge(dir) {
  return dir==='BUY'?`<span class="badge bg">▲ BUY</span>`:`<span class="badge br">▼ SELL</span>`;
}
function plClass(n) { return Number(n)>=0?'gr-text':'rd-text'; }

function navBadge(tab) {
  if(tab==='segnali'){const n=S.signals.filter(s=>s.stato==='attivato').length;return n?`<span class="nav-badge">${n}</span>`:'';}
  if(tab==='portafoglio'){const n=openTrades().length;return n?`<span class="nav-badge">${n}</span>`:''}
  return '';
}

// ════════════════════════════════════════════════════
// VIEW: DASHBOARD
// ════════════════════════════════════════════════════
function viewDashboard() {
  const closed=closedTrades(), open=openTrades();
  const tpl=totalPL(), tax=totalTax(), netto=tpl-tax;
  const wins=closed.filter(t=>(nn(t.pl_lordo)||0)>0).length;
  const wr=closed.length?(wins/closed.length*100).toFixed(0):0;
  const bySeg=S.signals.reduce((a,s)=>{a[s.stato]=(a[s.stato]||0)+1;return a},{});
  const byP=summaryByPlatform();
  const totalInv=open.reduce((s,t)=>s+(nn(t.investito_eur)||0),0);

  return `
  <div class="ph">
    <div><div class="ph-title">Dashboard</div>
    <div class="ph-sub">${S.lastSync?'Sync: '+new Date(S.lastSync).toLocaleTimeString('it-IT'):''}</div></div>
    <div class="flex gap2 ai">${S.gasUrl?`<button class="btn btn-gh btn-sm" onclick="gasRead()">↻ Sync</button>`:''}</div>
  </div>
  ${S.syncErr?`<div class="alert al-danger">⚠ Sync error: ${esc(S.syncErr)}</div>`:''}
  <div class="stats-grid">
    <div class="stat"><div class="stat-label">P&L Lordo</div><div class="stat-val ${tpl>=0?'gr':'rd'}">${tpl>=0?'+':''}${fmt(tpl)}€</div><div class="stat-sub">${closed.length} trade chiusi</div></div>
    <div class="stat"><div class="stat-label">Tasse Stimate</div><div class="stat-val rd">-${fmt(tax)}€</div><div class="stat-sub">26% dichiarativo</div></div>
    <div class="stat"><div class="stat-label">P&L Netto</div><div class="stat-val ${netto>=0?'gr':'rd'}">${netto>=0?'+':''}${fmt(netto)}€</div><div class="stat-sub">Post imposte stimate</div></div>

function viewSegnali() {
  const filter=S.filterSeg;
  const cnt=k=>S.signals.filter(s=>s.stato===k).length;
  const list=filter==='tutti'?[...S.signals]:S.signals.filter(s=>s.stato===filter);
  const tabs2=[
    {k:'tutti',l:'Tutti',n:S.signals.length},
    {k:'ricevuto',l:'Ricevuti',n:cnt('ricevuto')},
    {k:'attivato',l:'Attivati',n:cnt('attivato')},
    {k:'aperto',l:'Aperti',n:cnt('aperto')},
    {k:'chiuso_tp',l:'TP',n:cnt('chiuso_tp')},
    {k:'chiuso_stop',l:'Stop',n:cnt('chiuso_stop')},
    {k:'scartato',l:'Scartati',n:cnt('scartato')},
  ];
  return `
  <div class="ph"><div class="ph-title">Segnali EK</div><button class="btn btn-pr" onclick="openM('addSig')">+ Nuovo Segnale</button></div>
  <div class="flex gap2 fw" style="margin-bottom:16px">
    ${tabs2.map(t=>`<button class="btn btn-sm ${filter===t.k?'btn-pr':'btn-gh'}" onclick="S.filterSeg='${t.k}';render()">${t.l} <span style="opacity:.6">${t.n}</span></button>`).join('')}
  </div>
  <div class="card" style="padding:0">
    <div class="tbl-wrap"><table>
      <thead><tr><th>Data</th><th>Ticker</th><th>MKT</th><th>Dir.</th><th>Entry±M $</th><th>Stop±M $</th><th>% → TP1</th><th>% → Stop</th><th>Stato</th><th>Azioni</th></tr></thead>
      <tbody>
        ${list.length===0?`<tr><td colspan="10" class="empty">Nessun segnale</td></tr>`:''}
        ${list.map(s=>{
          const pctTp=movePct(s.direzione,nn(s.entrata_margine),nn(s.tp1));
          const pctSt=movePct(s.direzione,nn(s.entrata_margine),nn(s.stop_margine));
          const acts=[];
          if(s.stato==='ricevuto') acts.push(`<button class="btn btn-sm btn-gh" onclick="openM('activateSig',{id:'${s.id}'})">Attiva</button>`);
          if(s.stato==='attivato'){
            acts.push(`<button class="btn btn-sm btn-pr" onclick="openM('openTrade',{id:'${s.id}'})">Apri Trade</button>`);
            acts.push(`<button class="btn btn-sm btn-gh" onclick="updSig('${s.id}',{stato:'scartato'})">Scarta</button>`);
          }
          if(s.stato==='aperto'){
            const t=S.trades.find(t=>t.signal_id===s.id&&t.stato==='aperto');
            if(t) acts.push(`<button class="btn btn-sm btn-rd" onclick="openM('closeTrade',{sigId:'${s.id}',tradeId:'${t.id}'})">Chiudi</button>`);
          }
          acts.push(`<button class="btn btn-sm btn-gh" onclick="openM('editSig',{id:'${s.id}'})">✏</button>`);
          return `<tr>
            <td class="dim mono">${fmtDate(s.data_segnale)}</td>
            <td><strong>${esc(s.ticker)}</strong></td>
            <td><span class="tag">${esc(s.market||'')}</span></td>
            <td>${dirBadge(s.direzione)}</td>
            <td class="mono">${fmt(s.entrata_margine)}</td>
            <td class="mono rd-text">${fmt(s.stop_margine)}</td>
            <td class="mono gr-text">${pctTp?fmtPct(pctTp):'—'}</td>
            <td class="mono rd-text">${pctSt?fmtPct(pctSt):'—'}</td>
            <td>${badge(s.stato)}</td>
            <td><div class="flex gap1">${acts.join('')}</div></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>
  </div>`;
}

function viewPortafoglio() {
  const open=openTrades();
  return `
  <div class="ph"><div class="ph-title">Portafoglio — Posizioni Aperte</div></div>

  ${open.map(t=>{
    const sig=S.signals.find(s=>s.id===t.signal_id)||{};
    const entry=nn(t.entry_price), stop=nn(sig.stop_margine||t.sl_livello), tp=nn(t.tp_livello||sig.tp1);
    const inv=nn(t.investito_eur);
    const pctTp=movePct(t.direzione,entry,tp);
    const pctSt=movePct(t.direzione,entry,stop);
    const gainEur=entry&&tp&&inv?calcPL_EUR(t.direzione,entry,tp,inv,0):null;
    const lossEur=entry&&stop&&inv?calcPL_EUR(t.direzione,entry,stop,inv,nn(t.comm_open)||0):null;
    const rr=gainEur&&lossEur&&lossEur<0?(Math.abs(gainEur)/Math.abs(lossEur)).toFixed(2):null;
    return `
    <div class="card">
      <div class="card-head">
        <div class="flex ai gap2">
          <span style="font-size:17px;font-weight:800">${esc(t.ticker)}</span>
          ${dirBadge(t.direzione)}
          <span class="platform-tag">${esc(t.piattaforma)}</span>
          <span class="dim" style="font-size:11px">${esc(sig.market||t.market||'')}</span>
        </div>
        <button class="btn btn-sm btn-rd" onclick="openM('closeTrade',{sigId:'${sig.id||''}',tradeId:'${t.id}'})">Chiudi posizione</button>
      </div>
      <div class="card-body">
        <div class="gr4" style="margin-bottom:16px">
          <div><div class="stat-label">Investito</div><div class="mono" style="font-size:16px;font-weight:700">${inv?fmt(inv)+'€':'—'}</div></div>
          <div><div class="stat-label">Azioni</div><div style="font-size:16px;font-weight:700">${t.num_azioni||'—'}</div></div>
          <div><div class="stat-label">Entry $</div><div class="mono" style="font-size:16px;font-weight:700">${fmt(entry)}</div></div>
          <div><div class="stat-label">Apertura</div><div class="dim" style="font-size:13px;margin-top:2px">${fmtDate(t.data_apertura)}</div></div>
        </div>
        <div class="pot-row">
          <div class="pot-item">
            <div class="pot-label">🎯 Target TP1</div>
            <div class="pot-val gr-text">${tp?fmt(tp)+' $':''} ${pctTp?'('+fmtPct(pctTp)+')':''}</div>
            <div style="font-size:12px;color:var(--t2);margin-top:4px">Gain stimato: <span class="gr-text">${gainEur?'+'+fmt(gainEur)+'€':'—'}</span></div>
          </div>
          <div class="pot-item">
            <div class="pot-label">🛑 Stop ± Margine</div>
            <div class="pot-val rd-text">${stop?fmt(stop)+' $':''} ${pctSt?'('+fmtPct(pctSt)+')':''}</div>
            <div style="font-size:12px;color:var(--t2);margin-top:4px">Loss max: <span class="rd-text">${lossEur?fmt(lossEur)+'€':'—'}</span></div>
          </div>
        </div>
        ${rr?`<div style="margin-top:10px;font-size:12px;color:var(--t2)">Risk/Reward: <span class="mono ${Number(rr)>=2?'gr-text':'yl-text'}"">1:${rr}</span></div>`:''}
        ${t.note?`<div class="dim" style="font-size:12px;margin-top:10px;padding-top:10px;border-top:1px solid var(--b1)">📝 ${esc(t.note)}</div>`:''}
      </div>
    </div>`;
  }).join('')}`;
}

          <div class="form-group"><label>Stop ± Margine <span class="dim">(auto)</span></label><input type="number" id="f_sm" step="0.0001" value="${s.stop_margine||''}"><div class="input-hint">Stop loss effettivo</div></div>
        </div>
        <div class="gr2">
          <div class="form-group"><label>A mercato?</label><select id="f_amk"><option ${s.a_mercato==='No'?'selected':''}>No</option><option ${s.a_mercato==='Si'?'selected':''}>Si</option></select></div>
          <div class="form-group"><label>Valido?</label><select id="f_val"><option ${s.valido==='Si'?'selected':''}>Si</option><option ${s.valido==='No'?'selected':''}>No</option></select></div>
        </div>
        <div class="form-group"><label>Link Telegram</label><input type="url" id="f_link" value="${esc(s.link_telegram||'')}" placeholder="https://t.me/..."></div>
        <div class="form-group"><label>Note EK</label><textarea id="f_note" rows="2">${esc(s.note_ek||'')}</textarea></div>
        ${type==='editSig'?`<div class="form-group"><label>Stato</label><select id="f_stato">${Object.entries(STATI).map(([k,v])=>`<option value="${k}" ${s.stato===k?'selected':''}>${v.l}</option>`).join('')}</select></div>`:''}
      </div>
      <div class="modal-foot">
        <button class="btn btn-gh" onclick="closeM()">Annulla</button>
        <button class="btn btn-pr" onclick="${type==='addSig'?'submitAddSig()':'submitEditSig(\''+s.id+'\')'}">Salva Segnale</button>
      </div>
    </div></div>`;
  }

  /* ── ACTIVATE SIGNAL ── */
  if (type==='activateSig') {
    const s=S.signals.find(x=>x.id===data.id)||{};
    const pctTp=movePct(s.direzione,nn(s.entrata_margine),nn(s.tp1));
    const pctSt=movePct(s.direzione,nn(s.entrata_margine),nn(s.stop_margine));
    return `<div class="ov" onclick="if(event.target===this)closeM()">
    <div class="modal">
      <div class="modal-head"><div class="modal-title">Attiva Segnale — ${esc(s.ticker)}</div><button class="modal-close" onclick="closeM()">✕</button></div>
      <div class="modal-body">
        <div class="alert al-warn">Confermi che sul sito EK le condizioni sono verificate (Valido = Sì)?</div>
        <div style="background:var(--s2);border-radius:8px;padding:14px">
          <div class="gr4">
            <div><div class="stat-label">Entry±M</div><div class="mono">${fmt(s.entrata_margine)}</div></div>
            <div><div class="stat-label">Stop±M</div><div class="mono rd-text">${fmt(s.stop_margine)}</div></div>
            <div><div class="stat-label">% → TP1</div><div class="mono gr-text">${pctTp?fmtPct(pctTp):'—'}</div></div>
            <div><div class="stat-label">% → Stop</div><div class="mono rd-text">${pctSt?fmtPct(pctSt):'—'}</div></div>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-gh" onclick="closeM()">Annulla</button>
        <button class="btn btn-pr" onclick="updSig('${s.id}',{stato:'attivato'});closeM()">⚡ Attiva</button>
      </div>
    </div></div>`;
  }

  /* ── OPEN TRADE ── */
  if (type==='openTrade') {
    const s=S.signals.find(x=>x.id===data.id)||{};
    return `<div class="ov" onclick="if(event.target===this)closeM()">
    <div class="modal">
      <div class="modal-head"><div class="modal-title">Apri Trade — ${esc(s.ticker)}</div><button class="modal-close" onclick="closeM()">✕</button></div>
      <div class="modal-body">
        <div class="alert al-info">Entry±M: <strong>${fmt(s.entrata_margine)} $</strong> · Stop±M: <strong>${fmt(s.stop_margine)} $</strong> · TP1: <strong>${fmt(s.tp1)} $</strong></div>
        <div class="gr2">
          <div class="form-group"><label>Piattaforma</label><select id="ot_pf">${PLATFORMS.map(p=>`<option>${p}</option>`).join('')}</select></div>
          <div class="form-group"><label>Data Apertura</label><input type="date" id="ot_dt" value="${today()}"></div>
        </div>
        <div class="section-title">Esecuzione</div>
        <div class="gr2">
          <div class="form-group">
            <label>Valore Investito (€)</label>
            <input type="number" id="ot_inv" step="10" placeholder="es. 1000" oninput="previewOpen()">
            <div class="input-hint">Importo in euro messo sul trade</div>
          </div>
          <div class="form-group">
            <label>Numero Azioni</label>
            <input type="number" id="ot_naz" step="1" placeholder="es. 250">
            <div class="input-hint">Quante azioni hai comprato (info)</div>
          </div>
        </div>
        <div class="gr2">
          <div class="form-group">
            <label>Entry Effettivo ($)</label>
            <input type="number" id="ot_ep" step="0.001" value="${s.entrata_margine||s.entrata||''}" oninput="previewOpen()">
          </div>
          <div class="form-group">
            <label>TP Livello ($)</label>
            <input type="number" id="ot_tp" step="0.001" value="${s.tp1||''}">
          </div>
        </div>
        <div class="form-group">
          <label>Commissioni Apertura (€)</label>
          <input type="number" id="ot_co" step="0.01" value="0">
        </div>
        <div id="openPreview"></div>
        <div class="form-group"><label>Note</label><textarea id="ot_nt" rows="2" placeholder="Note operative..."></textarea></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-gh" onclick="closeM()">Annulla</button>
        <button class="btn btn-gr" onclick="submitOpenTrade('${s.id}')">✅ Apri Trade</button>
      </div>
    </div></div>`;
  }

  /* ── CLOSE TRADE ── */
  if (type==='closeTrade') {
    const s=S.signals.find(x=>x.id===data.sigId)||{};
    const t=S.trades.find(x=>x.id===data.tradeId)||{};
    return `<div class="ov" onclick="if(event.target===this)closeM()">
    <div class="modal">
      <div class="modal-head"><div class="modal-title">Chiudi Trade — ${esc(t.ticker)}</div><button class="modal-close" onclick="closeM()">✕</button></div>
      <div class="modal-body">
        <div class="alert al-warn">
          Entry: <strong>${fmt(t.entry_price)} $</strong> · 
          Stop±M: <strong>${fmt(s.stop_margine||t.sl_livello)} $</strong> · 
          Investito: <strong>${t.investito_eur?fmt(t.investito_eur)+'€':'—'}</strong> · 
          <strong>${esc(t.piattaforma)}</strong>
        </div>
        <div class="gr2">
          <div class="form-group"><label>Motivo Chiusura</label>
            <select id="ct_mo">
              <option value="chiuso_tp">✅ Take Profit</option>
              <option value="chiuso_stop">🛑 Stop Loss</option>
              <option value="chiuso_man">🔒 Chiusura Manuale</option>
            </select>
          </div>
          <div class="form-group"><label>Data Chiusura</label><input type="date" id="ct_dt" value="${today()}"></div>
        </div>
        <div class="gr2">
          <div class="form-group">
            <label>Prezzo Exit ($)</label>
            <input type="number" id="ct_ex" step="0.001" placeholder="Prezzo di uscita" oninput="previewPL()">
          </div>
          <div class="form-group">
            <label>Commissioni Chiusura (€)</label>
            <input type="number" id="ct_cc" step="0.01" value="0" oninput="previewPL()">
          </div>
        </div>
        <div id="plPreview"></div>
        <div class="form-group"><label>Note / Lezione appresa</label><textarea id="ct_nt" rows="2" placeholder="Cosa ho imparato..."></textarea></div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-gh" onclick="closeM()">Annulla</button>
        <button class="btn btn-rd" onclick="submitCloseTrade('${t.id}','${s.id||''}')">Conferma Chiusura</button>
      </div>
    </div></div>`;
  }
  return '';
}

// ════════════════════════════════════════════════════
// MODAL LOGIC
// ════════════════════════════════════════════════════
function collectSigForm() {
  const dir=document.getElementById('f_dir').value;
  const ent=nn(document.getElementById('f_ent').value)||0;
  const sl1=nn(document.getElementById('f_sl1').value)||0;
  const mrg=nn(document.getElementById('f_mrg').value)||0;
  let em=nn(document.getElementById('f_em').value);
  let sm=nn(document.getElementById('f_sm').value);
  if (!em && ent && mrg) em = dir==='BUY' ? ent+mrg : ent-mrg;
  if (!sm && sl1 && mrg) sm = dir==='BUY' ? sl1-mrg : sl1+mrg;
  return {
    data_segnale: document.getElementById('f_data').value,
    market: document.getElementById('f_mkt').value,
    ticker: document.getElementById('f_ticker').value.trim().toUpperCase(),
    direzione: dir,
    entrata:  nn(document.getElementById('f_ent').value),
    tp1:      nn(document.getElementById('f_tp1').value),
    tp2:      nn(document.getElementById('f_tp2').value),
    sl1:      nn(document.getElementById('f_sl1').value),
    sl2:      nn(document.getElementById('f_sl2').value),
    margine:  mrg || null,
    entrata_margine: em,
    stop_margine:    sm,
    link_telegram: document.getElementById('f_link').value,
    a_mercato: document.getElementById('f_amk').value,
    valido:    document.getElementById('f_val').value,
    note_ek:   document.getElementById('f_note').value,
  };
}

function autoMargini() {
  const dir=document.getElementById('f_dir')?.value;
  const ent=nn(document.getElementById('f_ent')?.value)||0;
  const sl1=nn(document.getElementById('f_sl1')?.value)||0;
  const mrg=nn(document.getElementById('f_mrg')?.value)||0;
  if (!mrg || !ent) return;
  const emEl=document.getElementById('f_em'), smEl=document.getElementById('f_sm');
  if (emEl) emEl.value=(dir==='BUY'?ent+mrg:ent-mrg).toFixed(4);
  if (smEl) smEl.value=(dir==='BUY'?sl1-mrg:sl1+mrg).toFixed(4);
}

function submitAddSig() {
  const d=collectSigForm();
  if (!d.ticker) { alert('Ticker obbligatorio'); return; }
  addSignal(d); closeM();
}
function submitEditSig(id) {
  const d=collectSigForm();
  const stato=document.getElementById('f_stato')?.value;
  updSig(id, {...d, ...(stato?{stato}:{})});
  closeM();
}

function previewOpen() {
  const inv=nn(document.getElementById('ot_inv')?.value);
  const ep=nn(document.getElementById('ot_ep')?.value);
  const sigId=S.modal?.data?.id;
  const s=S.signals.find(x=>x.id===sigId)||{};
  const stop=nn(s.stop_margine||s.sl1);
  const tp=nn(document.getElementById('ot_tp')?.value||s.tp1);
  const el=document.getElementById('openPreview'); if(!el) return;
  if (!inv||!ep) { el.innerHTML=''; return; }
  const gainEur=tp?calcPL_EUR(s.direzione,ep,tp,inv,0):null;
  const lossEur=stop?calcPL_EUR(s.direzione,ep,stop,inv,0):null;
  const rr=gainEur&&lossEur&&lossEur<0?(Math.abs(gainEur)/Math.abs(lossEur)).toFixed(2):null;
  el.innerHTML=`<div style="background:var(--s2);border-radius:8px;padding:12px;margin-bottom:12px">
    <div class="gr3">
      <div><div class="stat-label">Pot. Gain (TP1)</div><div class="mono gr-text">${gainEur?'+'+fmt(gainEur)+'€':'—'}</div></div>
      <div><div class="stat-label">Max Loss (Stop)</div><div class="mono rd-text">${lossEur?fmt(lossEur)+'€':'—'}</div></div>
      <div><div class="stat-label">Risk/Reward</div><div class="mono ${rr&&Number(rr)>=2?'gr-text':'yl-text'}">${rr?'1:'+rr:'—'}</div></div>
    </div>
  </div>`;
}

function submitOpenTrade(sigId) {
  const inv=nn(document.getElementById('ot_inv')?.value);
  const ep=nn(document.getElementById('ot_ep')?.value);
  if (!inv || !ep) { alert('Valore investito e Entry sono obbligatori'); return; }
  const s=S.signals.find(x=>x.id===sigId)||{};
  addTrade({
    signal_id:    sigId,
    ticker:       s.ticker,
    market:       s.market,
    direzione:    s.direzione,
    piattaforma:  document.getElementById('ot_pf').value,
    data_apertura:document.getElementById('ot_dt').value,
    entry_price:  ep,
    investito_eur:inv,
    num_azioni:   nn(document.getElementById('ot_naz')?.value),
    sl_livello:   s.stop_margine||s.sl1,
    tp_livello:   nn(document.getElementById('ot_tp')?.value),
    comm_open:    nn(document.getElementById('ot_co')?.value)||0,
    note:         document.getElementById('ot_nt').value,
  });
  updSig(sigId, {stato:'aperto'});
  closeM();
}

function previewPL() {
  const t=S.trades.find(x=>x.id===S.modal?.data?.tradeId);
  if (!t) return;
  const exP=nn(document.getElementById('ct_ex')?.value);
  const cc=nn(document.getElementById('ct_cc')?.value)||0;
  const el=document.getElementById('plPreview'); if(!el) return;
  if (!exP) { el.innerHTML=''; return; }
  const pl=calcPL_EUR(t.direzione,nn(t.entry_price),exP,nn(t.investito_eur),cc);
  if (pl==null) { el.innerHTML=''; return; }
  const tax=calcTax(pl, t.piattaforma);
  const pct=movePct(t.direzione,nn(t.entry_price),exP);
  el.innerHTML=`<div class="alert ${pl>=0?'al-success':'al-danger'}">
    Movimento: <strong>${fmtPct(pct)}</strong> · 
    P&L lordo: <strong>${fmtEur(pl)}</strong>
    ${t.piattaforma!==FINECO?` · Tasse: <strong>-${fmt(tax)}€</strong> · Netto: <strong>${fmtEur(pl-tax)}</strong>`:'· Fineco: tasse gestite dal broker'}
  </div>`;
}

function submitCloseTrade(tradeId, sigId) {
  const exP=nn(document.getElementById('ct_ex')?.value);
  if (!exP) { alert('Inserisci il prezzo di exit'); return; }
  const t=S.trades.find(x=>x.id===tradeId)||{};
  const cc=nn(document.getElementById('ct_cc')?.value)||0;
  const motivo=document.getElementById('ct_mo').value;
  const pl=calcPL_EUR(t.direzione,nn(t.entry_price),exP,nn(t.investito_eur),cc);
  const tax=calcTax(pl,t.piattaforma);
  updTrade(tradeId, {
    exit_price:   exP,
    data_chiusura:document.getElementById('ct_dt').value,
    comm_close:   cc,
    pl_lordo:     pl!=null?+pl.toFixed(2):null,
    tasse:        +tax.toFixed(2),
    pl_netto:     pl!=null?+(pl-tax).toFixed(2):null,
    stato:        motivo,
    note:         document.getElementById('ct_nt').value,
  });
  if (sigId) updSig(sigId, {stato:motivo});
  closeM();
}

// ════════════════════════════════════════════════════
// SETUP ACTIONS
// ════════════════════════════════════════════════════
function saveGas() {
  const url=document.getElementById('gasInput')?.value?.trim();
  if (!url) { alert('Inserisci un URL'); return; }
  S.gasUrl=url; localStorage.setItem('ek_gas',url);
  gasRead();
}
async function testGas() {
  const url=document.getElementById('gasInput')?.value?.trim();
  const el=document.getElementById('gasStatus');
  if (!url) { if(el) el.innerHTML=`<div class="alert al-warn">Inserisci prima un URL</div>`; return; }
  if (el) el.innerHTML=`<div class="alert al-info">Connessione in corso...</div>`;
  try {
    const r=await fetch(url+'?action=ping');
    const d=await r.json();
    if (el) el.innerHTML=`<div class="alert al-success">✅ Connessione riuscita — ${d.ts||'OK'}</div>`;
  } catch(e) {
    if (el) el.innerHTML=`<div class="alert al-danger">❌ Errore: ${esc(e.message)}</div>`;
  }
}

// ════════════════════════════════════════════════════
// MAIN RENDER
// ════════════════════════════════════════════════════
const TABS = [
  {id:'dashboard',   ic:'▦', l:'Dashboard'},
  {id:'segnali',     ic:'◎', l:'Segnali EK'},
  {id:'portafoglio', ic:'◈', l:'Portafoglio'},
  {id:'storico',     ic:'≡', l:'Storico'},
  {id:'setup',       ic:'⚙', l:'Setup'},
];
const VIEWS = {
  dashboard:   viewDashboard,
  segnali:     viewSegnali,
  portafoglio: viewPortafoglio,
  storico:     viewStorico,
  setup:       viewSetup,
};

function render() {
  document.getElementById('app').innerHTML = `
  <div class="app">
    <div class="sidebar">
      <div class="logo"><span class="logo-dot"></span><span>EK Tracker</span></div>
      <nav class="nav">
        ${TABS.map(t=>`
          <div class="nav-item ${S.tab===t.id?'active':''}" onclick="S.tab='${t.id}';render()">
            <span class="nav-icon">${t.ic}</span>
            <span>${t.l}</span>
            ${navBadge(t.id)}
          </div>`).join('')}
      </nav>
      <div class="sidebar-footer">
        <span class="conn-dot ${S.gasUrl?'ok':'err'}"></span>
        <span class="footer-text">${S.gasUrl?'Cloud sync':'Solo locale'}</span>
        <button class="theme-btn" onclick="toggleTheme()" title="Cambia tema">
          ${S.theme==='dark'?'☀':'🌙'}
        </button>
      </div>
    </div>
    <div class="main">
      <div class="main-inner">
        ${S.loading?`<div class="alert al-info" style="margin-bottom:16px">⏳ Sincronizzazione in corso...</div>`:''}
        ${(VIEWS[S.tab]||viewDashboard)()}
      </div>
    </div>
  </div>
  ${renderModal()}`;
}

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
render();
if (S.gasUrl) gasRead();
</script>
</body>
</html>
