.flex{display:flex}.gap1{gap:4px}.gap2{gap:8px}.gap3{gap:12px}.ai{align-items:center}.jb{justify-content:space-between}.fw{flex-wrap:wrap}

.ris-item{background:var(--s1);border-radius:7px;padding:10px 12px;border:1px solid var(--b1)}
.ris-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:4px}
.ris-val{font-size:14px;font-weight:700;font-family:var(--font-mono)}
.uscite-table{width:100%;border-collapse:collapse;margin-top:8px}
.uscite-table th{background:var(--s3);color:var(--t3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:8px 10px;text-align:left}
.uscite-table td{padding:8px 10px;border-bottom:1px solid var(--b1);font-size:12px;vertical-align:middle}
.uscite-table tr:last-child td{border-bottom:none}
.override-wrap{background:var(--yl-dim);border:1px solid rgba(245,197,66,.2);border-radius:8px;padding:12px;margin-top:12px}

@keyframes pulse-gr{0%,100%{box-shadow:0 0 0 0 rgba(0,200,150,.6)}70%{box-shadow:0 0 0 6px rgba(0,200,150,0)}}
@keyframes pulse-yl{0%,100%{box-shadow:0 0 0 0 rgba(245,197,66,.6)}70%{box-shadow:0 0 0 6px rgba(245,197,66,0)}}

.sig-light{width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block}
.sig-light.green{background:var(--gr);animation:pulse-gr 1.5s infinite}
.sig-light.yellow{background:var(--yl);animation:pulse-yl 2s infinite}
.sig-light.red{background:var(--rd);animation:pulse-rd 1.8s infinite}

@keyframes syncpulse{0%,100%{opacity:1}50%{opacity:.35}}
.sync-pulse{animation:syncpulse 1.2s ease-in-out infinite;display:inline-block;font-size:13px}
.sync-dot{font-size:13px}

  .sidebar{width:56px}.nav-item span,.nav-badge,.logo span,.footer-text{display:none}
  .main-inner{padding:16px}.gr3,.gr4{grid-template-columns:1fr 1fr}.stats-grid{grid-template-columns:1fr 1fr}

<body>
<div id="app"></div>
<script>
const PLATFORMS=['TradeZero','IBKR','Degiro','Fineco'];
const MARKETS=['Azioni','Crypto','Materie Prime','Forex'];
const STRATEGIES=['EK Investing','Personale'];
const TAX_RATE=0.26;
const FINECO='Fineco';
const DICHIARATIVO=['TradeZero','IBKR','Degiro'];
function getRegime(broker){return DICHIARATIVO.includes(broker)?'dichiarativo':'amministrato';}
const STATI_SIG={ricevuto:{l:'Ricevuto',cls:'bgr',ic:'📨'},attivato:{l:'Attivato',cls:'by',ic:'⚡'},aperto:{l:'Aperto',cls:'bb',ic:'📈'},chiuso_tp:{l:'TP ✓',cls:'bg',ic:'✅'},chiuso_stop:{l:'Stop Loss',cls:'br',ic:'🛑'},chiuso_man:{l:'Chiuso',cls:'bp',ic:'🔒'},scartato:{l:'Scartato',cls:'bgr',ic:'✕'}};
const CHIUSI_SIG=new Set(['chiuso_tp','chiuso_stop','chiuso_man']);

let S={
  tab:'dashboard',theme:localStorage.getItem('ek_theme')||'dark',
  gasUrl:localStorage.getItem('ek_gas')||'',pwd:localStorage.getItem('ek_pwd')||'',
  unlocked:sessionStorage.getItem('ek_auth')==='1',loginErr:false,
  signals:JSON.parse(localStorage.getItem('ek_segnali')||'[]'),
  trades:JSON.parse(localStorage.getItem('ek_trades')||'[]'),
  ordini:JSON.parse(localStorage.getItem('ek_ordini')||'[]'),
  loading:false,modal:null,filterSeg:'tutti',filterOrd:'tutti',
  lastSync:localStorage.getItem('ek_sync')||null,syncErr:null
};
document.documentElement.setAttribute('data-theme',S.theme);

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today=()=>new Date().toISOString().split('T')[0];
const nowDT=()=>new Date().toISOString().slice(0,16);
const nn=v=>(v==null||v==='')?null:Number(v);
const fmt=(n,d=2)=>n==null||n===''?'—':Number(n).toFixed(d);
const fmtPct=n=>n==null?'—':(Number(n)>=0?'+':'')+Number(n).toFixed(2)+'%';
const fmtEur=n=>n==null?'—':(Number(n)>=0?'+':'')+Number(n).toFixed(2)+'€';
const fmtUSD=n=>n==null?'—':'$'+Number(n).toFixed(2);
const fmtDate=d=>d?new Date(d.length<=10?d+'T12:00:00':d).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit'}):'—';
const fmtDT=d=>d?new Date(d).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function persist(){localStorage.setItem('ek_segnali',JSON.stringify(S.signals));localStorage.setItem('ek_trades',JSON.stringify(S.trades));localStorage.setItem('ek_ordini',JSON.stringify(S.ordini));}

function tryLogin(){const v=document.getElementById('loginPwd')?.value||'';if(v===S.pwd){sessionStorage.setItem('ek_auth','1');S.unlocked=true;S.loginErr=false;render();if(S.gasUrl)gasRead();}else{S.loginErr=true;render();setTimeout(()=>document.getElementById('loginPwd')?.focus(),50);}}
function logout(){sessionStorage.removeItem('ek_auth');S.unlocked=false;render();}
function togglePwdVisibility(id){const el=document.getElementById(id);if(el)el.type=el.type==='password'?'text':'password';}
function toggleTheme(){S.theme=S.theme==='dark'?'light':'dark';localStorage.setItem('ek_theme',S.theme);document.documentElement.setAttribute('data-theme',S.theme);render();}
function savePassword(p){S.pwd=p;localStorage.setItem('ek_pwd',p);sessionStorage.setItem('ek_auth','1');S.unlocked=true;render();}
function submitFirstSetup(){const p1=document.getElementById('setupPwd1')?.value||'';const p2=document.getElementById('setupPwd2')?.value||'';const el=document.getElementById('setupErr');if(p1.length<6){if(el)el.innerHTML=`<div class="login-error">Minimo 6 caratteri.</div>`;return;}if(p1!==p2){if(el)el.innerHTML=`<div class="login-error">Non corrispondono.</div>`;return;}savePassword(p1);}

function movePct(dir,entry,target){if(!entry||!target)return null;return dir==='BUY'?(target-entry)/entry*100:(entry-target)/entry*100;}
function calcTax(pl,platform){if(!pl||pl<=0)return 0;return pl*TAX_RATE;}
function taxLabel(p){return p===FINECO?'gestito broker':'dichiarativo';}

function calcOrdine(o){
  const uscite=JSON.parse(o.uscite||'[]');
  const entryP=nn(o.entry_price)||0,posSize=nn(o.position_size)||0,invEur=nn(o.investito_eur)||0,stopP=nn(o.stop_loss)||0;
  const buyAmount=entryP*posSize;
  const qtyExited=uscite.reduce((s,u)=>s+(nn(u.quantity)||0),0);
  const sellAmount=uscite.reduce((s,u)=>s+(nn(u.exit_price)||0)*(nn(u.quantity)||0),0);
  const totalComm=uscite.reduce((s,u)=>s+(nn(u.commission_eur)||0),0);
  const buyExited=entryP*qtyExited;
  const plUSD=o.position==='Long'?sellAmount-buyExited:buyExited-sellAmount;
  let plEur=null;
  if(buyAmount&&invEur&&qtyExited){const fraz=qtyExited/posSize;const pct=buyExited?plUSD/buyExited:0;plEur=invEur*fraz*pct-totalComm;}
  // Se almeno un'uscita ha pl_override reale, usalo invece del calcolato
  const hasUscitaOvr=uscite.some(u=>nn(u.pl_override)!==null);
  let plEurReal=null;
  if(hasUscitaOvr&&invEur&&posSize){
    plEurReal=uscite.reduce((sum,u)=>{
      const qU=nn(u.quantity)||0,epU=nn(u.exit_price)||0,cU=nn(u.commission_eur)||0;
      if(nn(u.pl_override)!==null)return sum+nn(u.pl_override);
      const buyU=entryP*qU,sellU=epU*qU,plU=o.position==='Long'?sellU-buyU:buyU-sellU;
      return sum+invEur*(qU/posSize)*(buyU?plU/buyU:0)-cU;
    },0);
  }
  const plOverride=nn(o.pl_override);
  const plFinal=plOverride!==null?plOverride:(plEurReal!==null?plEurReal:plEur);
  const invFraz=invEur&&posSize&&qtyExited?invEur*(qtyExited/posSize):null;
  const plPct=invFraz&&plFinal!==null?plFinal/invFraz*100:null;
  let duration=null;
  if(uscite.length>0&&o.entry_datetime){const lastExit=uscite.map(u=>u.exit_datetime).filter(Boolean).sort().pop();if(lastExit)duration=Math.round((new Date(lastExit)-new Date(o.entry_datetime))/(1000*60*60*24));}
  const maxLossUSD=stopP&&entryP&&posSize?Math.abs(entryP-stopP)*posSize:null;
  const maxLossEur=maxLossUSD&&buyAmount&&invEur?invEur*(maxLossUSD/buyAmount):null;
  const rMultiple=plFinal!==null&&maxLossEur?(plFinal/maxLossEur).toFixed(2):null;
  const qtyRem=posSize-qtyExited;
  const stato=qtyRem<=0?'chiuso':qtyExited>0?'parziale':'aperto';
  const minusComp=Math.max(0,nn(o.minus_compensata)||0);
  const baseImp=plFinal!==null?Math.max(0,plFinal-minusComp):null;
  const tax=baseImp!==null&&baseImp>0?baseImp*TAX_RATE:0;
  // Giorni aperti (da entry a oggi se ancora aperto, o all'ultima uscita se chiuso)
  let daysOpen=null;
  if(o.entry_datetime){
    const entryD=new Date(o.entry_datetime);
    let toDate;
    if(stato==='chiuso'&&uscite.length>0){
      const lastExit=uscite.map(u=>u.exit_datetime).filter(Boolean).sort().pop();
      toDate=lastExit?new Date(lastExit):new Date();
    } else {
      toDate=new Date();
    }
    daysOpen=Math.round((toDate-entryD)/(1000*60*60*24));
  }
  return{buyAmount,sellAmount,qtyExited,qtyRem,plUSD,plEur,plFinal,plPct,totalComm,duration:daysOpen,daysOpen,maxLossEur,rMultiple,minusComp,baseImp,tax,stato};
}

function gasUrlWith(extra){return S.gasUrl+'?token='+encodeURIComponent(S.pwd)+(extra?'&'+extra:'');}
function mergeByTs(local,remote){
  // Per ogni record usa la versione più recente (confronta timestamp updated/created)
  const result=[...remote];
  const repush=[];
  local.forEach(loc=>{
    const ri=result.findIndex(r=>r.id===loc.id);
    if(ri===-1){result.push(loc);repush.push(loc);}
    else{
      const lt=new Date(loc.updated||loc.created||0);
      const rt=new Date(result[ri].updated||result[ri].created||0);
      if(lt>rt){result[ri]=loc;repush.push(loc);}
    }
  });
  return{merged:result,repush};
}

async function gasRead(){
  if(!S.gasUrl||!S.pwd)return;
  S.loading=true;S.syncErr=null;render();
  try{
    const r=await fetch(gasUrlWith('action=read'));
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d.error)throw new Error(d.error);

    // Merge intelligente: mantiene la versione più recente per ogni record
    if(Array.isArray(d.signals)){const{merged,repush}=mergeByTs(S.signals,d.signals);S.signals=merged;repush.forEach(s=>gasWrite('signal','update',s));}
    if(Array.isArray(d.trades)) {const{merged,repush}=mergeByTs(S.trades,d.trades);S.trades=merged;repush.forEach(t=>gasWrite('trade','update',t));}
    if(Array.isArray(d.ordini)) {const{merged,repush}=mergeByTs(S.ordini,d.ordini);S.ordini=merged;repush.forEach(o=>gasWrite('ordine','update',o));}

    S.lastSync=new Date().toISOString();localStorage.setItem('ek_sync',S.lastSync);persist();
  }catch(e){S.syncErr=e.message;syncLastErr=e.message;updateSyncBadge();}
  finally{S.loading=false;render();}
}
async function gasWrite(type,op,record){if(!S.gasUrl||!S.pwd)return;syncPending++;updateSyncBadge();try{const r=await fetch(gasUrlWith(`action=write&type=${type}&op=${op}&record=${encodeURIComponent(JSON.stringify(record))}`));let d={};try{d=await r.json();}catch(e){}if(d&&d.error)throw new Error(d.error);syncLastOk=new Date();syncLastErr=null;}catch(e){syncLastErr=e.message;}finally{syncPending=Math.max(0,syncPending-1);updateSyncBadge();}}

    const db=new Date(b.entry_datetime||b.created||0);
    return db-da; // più recente prima
  });
  const filteredOrdini=sortByDate(filter==='tutti'?S.ordini:filter==='aperti'?S.ordini.filter(o=>o.stato==='aperto'||o.stato==='parziale'):S.ordini.filter(o=>o.stato===filter));
  const tabs=[{k:'tutti',l:'Tutti',n:S.ordini.length},{k:'aperti',l:'Aperti / Parziali',n:openOrdini().length},{k:'chiuso',l:'Chiusi',n:closedOrdini().length}];
  return `<div class="ph"><div class="ph-title">Ordini</div><button class="btn btn-pr" onclick="openM('addOrdine',{})">+ Nuovo Ordine</button></div>
  <div class="filter-tabs">${tabs.map(t=>`<button class="btn btn-sm ${filter===t.k?'btn-pr':'btn-gh'}" onclick="S.filterOrd='${t.k}';render()">${t.l} <span style="opacity:.6">${t.n}</span></button>`).join('')}</div>
  <div class="card" style="padding:0"><div class="tbl-wrap"><table>
  <thead><tr><th>Data</th><th>Symbol</th><th>Market</th><th>Pos.</th><th>Strategia</th><th>Piattaforma</th><th>Entry $</th><th>Size</th><th>Investito €</th><th>Giorni</th><th>P&L €</th><th>P&L%</th><th>Stato</th><th>Azioni</th></tr></thead>
  <tbody>${filteredOrdini.length===0?`<tr><td colspan="13" class="empty">Nessun ordine</td></tr>`:''}
  ${filteredOrdini.map((o)=>{
    const res=calcOrdine(o);
    const plD=res.plFinal!==null?`<span class="badge ${res.plFinal>=0?'bg':'br'}">${fmtEur(res.plFinal)}</span>`:'<span class="dim">—</span>';
    const pctD=res.plPct!==null?`<span class="mono ${plClass(res.plPct)}">${fmtPct(res.plPct)}</span>`:'—';
    const ovrIcon=nn(o.pl_override)!==null?`<span class="badge by" style="padding:1px 5px;font-size:9px">OVR</span>`:'';
    const daysLabel=res.daysOpen!==null?`<span class="mono dim">${res.daysOpen}g</span>`:'<span class="dim">—</span>';
    const entryDateLabel=o.entry_datetime?fmtDate(o.entry_datetime):'<span class="dim">—</span>';
    return `<tr>
      <td class="dim mono" style="font-size:11px">${entryDateLabel}</td>
      <td><strong>${esc(o.symbol)}</strong></td>
      <td>${marketBadge(o.market||'')}</td>
      <td>${dirBadge(o.position)}</td>
      <td>${stratBadge(o.strategy)}</td>
      <td><span class="platform-tag">${esc(o.piattaforma)}</span></td>
      <td class="mono">${fmt(o.entry_price)}</td>
      <td class="dim">${o.position_size||'—'} ${res.qtyRem>0?`<span style="font-size:10px;color:var(--yl)">(${res.qtyRem} rim.)</span>`:''}</td>
      <td class="mono">${o.investito_eur?fmt(o.investito_eur)+'€':'—'}</td>
      <td>${daysLabel}</td>
      <td>${plD} ${ovrIcon}</td>
      <td>${pctD}</td>
      <td>${statoBadge(res.stato)}</td>
      <td><div class="flex gap1">
        <button class="btn btn-sm btn-gh" onclick="openM('dettaglioOrdine',{id:'${o.id}'})">Dettaglio</button>
        ${res.stato!=='chiuso'?`<button class="btn btn-sm btn-pr" onclick="openM('addUscita',{id:'${o.id}'})">+ Uscita</button>`:''}
      </div></td>
    </tr>`;
  }).join('')}</tbody></table></div></div>`;
}

      </div>`:''}
    </div>
    ${renderMinusSelectionUI(o.id)}
    <div class="override-wrap" style="margin-top:14px"><div class="override-label">⚡ Override P&L Globale Ordine</div>
    <div class="gr2">
      <div class="form-group" style="margin-bottom:0"><label>P&L Reale Totale (€)</label><input type="number" id="ovr_pl" step="0.01" value="${o.pl_override!==null&&o.pl_override!==undefined?o.pl_override:''}" placeholder="Lascia vuoto per usare il calcolato"></div>

  }

    <div class="section-title">Identificazione</div>
    <div class="gr4"><div class="form-group"><label>Piattaforma</label><select id="eo_pf">${PLATFORMS.map(p=>`<option ${o.piattaforma===p?'selected':''}>${p}</option>`).join('')}</select></div><div class="form-group"><label>Market</label><select id="eo_mkt">${MARKETS.map(m=>`<option ${o.market===m?'selected':''}>${m}</option>`).join('')}</select></div><div class="form-group"><label>Strategia</label><select id="eo_str">${STRATEGIES.map(s=>`<option ${o.strategy===s?'selected':''}>${s}</option>`).join('')}</select></div><div class="form-group"><label>Posizione</label><select id="eo_pos"><option ${o.position==='Long'?'selected':''}>Long</option><option ${o.position==='Short'?'selected':''}>Short</option></select></div></div>
    <div class="form-group"><label>Symbol</label><input type="text" id="eo_sym" value="${esc(o.symbol||'')}" oninput="this.value=this.value.toUpperCase()"></div>
    <div class="section-title">Apertura</div>
    <div class="gr3"><div class="form-group"><label>Data & Ora Entry</label><input type="datetime-local" id="eo_edt" value="${o.entry_datetime||''}"></div><div class="form-group"><label>Entry Price ($)</label><input type="number" id="eo_ep" step="0.001" value="${o.entry_price||''}"></div><div class="form-group"><label>N. Azioni</label><input type="number" id="eo_ps" step="1" value="${o.position_size||''}"></div></div>
    <div class="gr2"><div class="form-group"><label>Investito (€)</label><input type="number" id="eo_inv" step="10" value="${o.investito_eur||''}"></div><div class="form-group"><label>Stop Loss ($)</label><input type="number" id="eo_sl" step="0.001" value="${o.stop_loss||''}"></div></div>
    <div class="form-group"><label>Note</label><textarea id="eo_note" rows="2">${esc(o.note||'')}</textarea></div>
    </div><div class="modal-foot"><button class="btn btn-gh" onclick="closeM()">Annulla</button><button class="btn btn-pr" onclick="submitEditOrdine('${o.id}')">Salva</button></div></div></div>`;
  }
  if(type==='editUscita'){
    const{ordineId,uscitaId}=data;
    const o=S.ordini.find(x=>x.id===ordineId)||{};
    const uscite=JSON.parse(o.uscite||'[]');
    const u=uscite.find(x=>x.id===uscitaId)||{};
    const res=calcOrdine(o);
    const entryP=nn(o.entry_price)||0,invEur=nn(o.investito_eur)||0,psOrd=nn(o.position_size)||1;
    const qtyU=nn(u.quantity)||0,epU=nn(u.exit_price)||0,cU=nn(u.commission_eur)||0;
    const sellU=epU*qtyU,buyU=entryP*qtyU,plU=o.position==='Long'?sellU-buyU:buyU-sellU;
    const plCalc=invEur&&psOrd?invEur*(qtyU/psOrd)*(buyU?plU/buyU:0)-cU:null;
    return `<div class="ov" onclick="if(event.target===this)closeM()"><div class="modal"><div class="modal-head"><div class="modal-title">Modifica Uscita — ${esc(o.symbol)}</div><button class="modal-close" onclick="closeM()">✕</button></div><div class="modal-body">
    <div class="alert al-info">P&L calcolato automaticamente: <strong>${plCalc!==null?fmtEur(plCalc):'—'}</strong> · Inserisci il P&L reale dalla piattaforma se diverso.</div>

    </div>

    </div><div class="modal-foot"><button class="btn btn-gh" onclick="closeM()">Annulla</button><button class="btn btn-pr" onclick="submitEditUscita('${ordineId}','${uscitaId}')">Salva Modifiche</button></div></div></div>`;
  }

  if(type==='minusDettaglioBroker'){
    const broker=data.broker;
    const now=new Date(),curYear=now.getFullYear();
    // Collect loss orders for this broker
    const lossOrders=[];
    S.ordini.forEach(o=>{
      if(o.piattaforma!==broker)return;
      const res=calcOrdine(o);
      if(res.stato!=='chiuso'||!res.plFinal||res.plFinal>=0)return;
      let year=curYear;
      try{const us=JSON.parse(o.uscite||'[]');const last=us.map(u=>u.exit_datetime).filter(Boolean).sort().pop();if(last)year=new Date(last).getFullYear();}catch(e){}
      const scade=year+4,expired=curYear-year>4;
      const disponibile=Math.abs(res.plFinal);
      const compSt=getCompensatedStatus(o.id,disponibile);
      lossOrders.push({o,res,year,scade,expired,disponibile,compSt});
    });
    // Group by year
    const byYear={};
    lossOrders.forEach(item=>{
      if(!byYear[item.year])byYear[item.year]={items:[],scade:item.scade,expired:item.expired};
      byYear[item.year].items.push(item);
    });
    const yearSections=Object.entries(byYear).sort(([a],[b])=>b-a).map(([yr,grp])=>{
      const totYr=grp.items.reduce((s,x)=>s+x.disponibile,0);
      const compYr=grp.items.reduce((s,x)=>s+(x.compSt.applied||0),0);
      const residYr=Math.max(0,totYr-compYr);
      const scadLabel=grp.expired?'<span class="rd-text">Scaduta</span>':`<span class="yl-text">Scade ${grp.scade}</span>`;
      const rows=grp.items.map(({o,res,disponibile,compSt})=>{
        const isFull=compSt.status==='full';
        const isPartial=compSt.status==='partial';
        let stLabel;
        if(isFull)stLabel='<span class="badge bg">✓ Compensata</span>';
        else if(isPartial)stLabel=`<span class="badge by">Parz. ${fmt(compSt.applied)}€</span>`;
        else stLabel='<span class="badge bgr">Da compensare</span>';
        return `<tr>
          <td><strong>${esc(o.symbol)}</strong></td>
          <td class="dim" style="font-size:11px">${fmtDate(o.entry_datetime)}</td>
          <td class="mono rd-text">-${fmt(disponibile)}€</td>
          <td class="mono yl-text">${compSt.applied>0?'-'+fmt(compSt.applied)+'€':'—'}</td>
          <td class="mono">${compSt.applied>0?fmt(disponibile-compSt.applied)+'€':'—'}</td>
          <td>${stLabel}</td>
          <td><button class="btn btn-sm btn-gh" onclick="closeM();openM('dettaglioOrdine',{id:'${o.id}'})">Apri</button></td>
        </tr>`;
      }).join('');
      return `<div style="margin-bottom:14px">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--b1);margin-bottom:8px">
          <span style="font-size:12px;font-weight:700">${yr} ${scadLabel}</span>
          <span style="font-size:12px;color:var(--t2)">Totale: <span class="mono rd-text">-${fmt(totYr)}€</span> · Residue: <span class="mono yl-text">-${fmt(residYr)}€</span></span>
        </div>
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="background:var(--s2)"><th style="padding:7px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);text-align:left">Symbol</th><th style="padding:7px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);text-align:left">Chiusura</th><th style="padding:7px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);text-align:left">Loss</th><th style="padding:7px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);text-align:left">Usata</th><th style="padding:7px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);text-align:left">Residua</th><th style="padding:7px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);text-align:left">Stato</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }).join('');
    return `<div class="ov" onclick="if(event.target===this)closeM()"><div class="modal modal-wide"><div class="modal-head">
      <div><div class="modal-title">📉 Minusvalenze — ${esc(broker)}</div><div style="font-size:11px;color:var(--t2);margin-top:3px">${lossOrders.length} ordini in perdita</div></div>
      <button class="modal-close" onclick="closeM()">✕</button>
    </div><div class="modal-body">${yearSections.length?yearSections:'<div class="empty">Nessuna minusvalenza per questo broker.</div>'}</div></div></div>`;
  }

  return '';
}

function calcMinusvalenzeHTML(){
  const now=new Date(),curYear=now.getFullYear();

  // Aggrega per broker
  const byBroker={};
  S.ordini.forEach(o=>{
    const res=calcOrdine(o);
    if(res.stato!=='chiuso'||!res.plFinal||res.plFinal>=0)return;
    let year=curYear;
    try{const us=JSON.parse(o.uscite||'[]');const last=us.map(u=>u.exit_datetime).filter(Boolean).sort().pop();if(last)year=new Date(last).getFullYear();}catch(e){}
    const scade=year+4,expired=curYear-year>4;
    const disponibile=Math.abs(res.plFinal);
    const compSt=getCompensatedStatus(o.id,disponibile);
    const appliedAmt=compSt.applied||0;
    const broker=o.piattaforma||'Altro';
    if(!byBroker[broker])byBroker[broker]={pool:0,compensated:0,remaining:0,orders:[],byYear:{}};
    const b=byBroker[broker];
    if(!expired)b.pool+=disponibile;
    b.compensated+=appliedAmt;
    b.remaining+=Math.max(0,disponibile-appliedAmt);
    b.orders.push({o,res,year,scade,expired,disponibile,compSt,appliedAmt});
    if(!b.byYear[year])b.byYear[year]={scade,expired,total:0,compensated:0};
    b.byYear[year].total+=disponibile;
    b.byYear[year].compensated+=appliedAmt;
  });

  const brokers=Object.keys(byBroker);
  if(brokers.length===0)return '';
  const pool=poolMinusvalenze();

  const brokerRows=brokers.map(broker=>{
    const b=byBroker[broker];
    // Build compact year summary
    const yearSummary=Object.entries(b.byYear).sort(([a],[b2])=>b2-a).map(([yr,d])=>{
      const residua=Math.max(0,d.total-d.compensated);
      if(residua<=0)return `<span class="dim" style="font-size:10px">${yr}: ✓</span>`;
      if(d.expired)return `<span class="rd-text" style="font-size:10px">${yr}: scaduta</span>`;
      return `<span class="yl-text" style="font-size:10px">${yr}: -${fmt(residua)}€ (scade ${d.scade})</span>`;
    }).join(' · ');
    return `<tr>
      <td><span class="platform-tag">${esc(broker)}</span></td>
      <td class="mono rd-text">-${fmt(b.pool)}€</td>
      <td class="mono yl-text">${b.compensated>0?'-'+fmt(b.compensated)+'€':'—'}</td>
      <td class="mono ${b.remaining>0?'yl-text':'gr-text'}">${b.remaining>0?'-'+fmt(b.remaining)+'€':'✓ Tutto compensato'}</td>
      <td style="font-size:11px">${yearSummary}</td>
      <td><button class="btn btn-sm btn-gh" onclick="openM('minusDettaglioBroker',{broker:'${esc(broker)}'})">Dettaglio →</button></td>
    </tr>`;
  }).join('');

  return `<div class="card" style="margin-top:16px">
    <div class="card-head">
      <div class="card-title">📉 Minusvalenze — Riepilogo per Broker</div>
    </div>
    <div style="padding:12px 18px;background:var(--s2);border-bottom:1px solid var(--b1)">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;font-size:12px">
        <div>Pool totale: <span class="mono rd-text">-${fmt(pool.pool)}€</span></div>
        <div>Già compensate: <span class="mono yl-text">-${fmt(pool.used)}€</span></div>
        <div>Residue: <span class="mono yl-text">-${fmt(pool.remaining)}€</span></div>
      </div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Broker</th><th>Pool</th><th>Compensate</th><th>Residue</th><th>Per Anno</th><th></th></tr></thead>
      <tbody>${brokerRows}</tbody>
    </table></div>
    <div style="padding:10px 18px;font-size:11px;color:var(--t3);border-top:1px solid var(--b1)">
      Clicca "Dettaglio →" per vedere gli ordini in perdita per broker · Le minusvalenze Fineco si compensano solo nel regime amministrato Fineco
    </div>
  </div>`;
}

function previewMinusComp(ordineId){
  const o=S.ordini.find(x=>x.id===ordineId); if(!o) return;
  const val=nn(document.getElementById('minus_comp_input')?.value)||0;
  const res=calcOrdine(o);
  if(!res.plFinal) return;
  const el=document.getElementById('minusCompPreview'); if(!el) return;
  const baseImp=Math.max(0,res.plFinal-val);
  const tax=baseImp*0.26;
  const netto=res.plFinal-tax;
  el.innerHTML=`<div style="background:var(--s2);border-radius:7px;padding:10px;font-size:12px"><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;color:var(--t2)"><span>P&L Lordo: <span class="mono gr-text">${fmtEur(res.plFinal)}</span></span><span>Minus: <span class="mono yl-text">${val?'-'+fmt(val)+'€':'—'}</span></span><span>Base imp.: <span class="mono">${fmt(baseImp)}€</span></span><span>Tasse: <span class="mono rd-text">-${fmt(tax)}€</span></span></div><div style="margin-top:6px;font-weight:700">P&L Netto stimato: <span class="mono ${plClass(netto)}">${fmtEur(netto)}</span></div></div>`;
}

function submitMinusComp(ordineId, remove=false){
  if(remove){ updOrdine(ordineId,{minus_compensata:null}); closeM(); return; }
  const val=nn(document.getElementById('minus_comp_input')?.value);
  if(val===null||val<0){ alert('Inserisci un importo valido (≥ 0)'); return; }
  const pool=poolMinusvalenze();
  const o=S.ordini.find(x=>x.id===ordineId)||{};
  const curMinus=nn(o.minus_compensata)||0;
  const maxApplicabile=pool.remaining+curMinus; // considera quella già applicata su questo ordine
  if(val>maxApplicabile+0.01){
    if(!confirm(`Pool disponibile: ${fmt(maxApplicabile)}€. Stai applicando ${fmt(val)}€. Continuare comunque?`)) return;
  }
  updOrdine(ordineId,{minus_compensata:val});
  closeM();
}


function getAvailableMinusvalenze(forOrdineId){
  const now=new Date(),curY=now.getFullYear();
  const forO=S.ordini.find(x=>x.id===forOrdineId)||{};
  let curRefs=[];try{curRefs=JSON.parse(forO.minus_refs||'[]');}catch(e){}

  // Filtra per regime fiscale compatibile
  const forRegime=getRegime(forO.piattaforma);
  return S.ordini.filter(o=>o.id!==forOrdineId&&getRegime(o.piattaforma)===forRegime).map(o=>{
    const res=calcOrdine(o);
    if(res.stato!=='chiuso'||!res.plFinal||res.plFinal>=0)return null;
    let year=curY;
    try{const us=JSON.parse(o.uscite||'[]');const last=us.map(u=>u.exit_datetime).filter(Boolean).sort().pop();if(last)year=new Date(last).getFullYear();}catch(e){}
    if(curY-year>4)return null;
    const totalLoss=Math.abs(res.plFinal);

    // Quanto già usato da TUTTI gli altri ordini (escluso forOrdineId)
    let usedByOthers=0;
    S.ordini.forEach(other=>{
      if(other.id===o.id||other.id===forOrdineId)return;
      try{const refs=JSON.parse(other.minus_refs||'[]');const r=refs.find(x=>x.id===o.id);if(r)usedByOthers+=r.importo||0;}catch(e){}
    });

    // Quanto l'ordine corrente sta già usando da questa minusvalenza
    const ref=curRefs.find(r=>r.id===o.id);
    const usedByCurrent=ref?ref.importo:0;

    // Disponibile = totale - usato dagli altri (il corrente può riusarlo/modificarlo)
    const available=Math.max(0,totalLoss-usedByOthers);

    // Se già tutto esaurito dagli altri → non mostrare
    if(available<=0&&usedByCurrent<=0)return null;

    return{
      id:o.id,symbol:o.symbol,piattaforma:o.piattaforma,
      year,scade:year+4,totalLoss,
      usedByOthers,
      alreadyApplied:usedByCurrent,  // quanto usa questo ordine
      available                        // quanto rimane disponibile (incluso quello già usato da questo)
    };
  }).filter(Boolean);
}

function calcAccantonamento(){
  let dich=0,fin=0;
  S.ordini.forEach(o=>{const res=calcOrdine(o);if(res.stato!=='chiuso')return;if(o.piattaforma===FINECO)fin+=res.tax;else dich+=res.tax;});
  return{dich,fin};
}

function updateMinusPreview(ordineId){
  const forO=S.ordini.find(x=>x.id===ordineId)||{};
  const res=calcOrdine(forO);
  if(!res.plFinal)return;
  const avail=getAvailableMinusvalenze(ordineId);
  let totalSel=0;
  avail.forEach(m=>{
    const cb=document.getElementById('mcb_'+m.id);
    const amt=document.getElementById('mamt_'+m.id);
    if(cb&&cb.checked&&amt) totalSel+=nn(amt.value)||0;
  });
  const baseImp=Math.max(0,res.plFinal-totalSel);
  const tax=baseImp*0.26;
  const netto=res.plFinal-tax;
  const el=document.getElementById('minusPreviewRow');
  if(el) el.innerHTML=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;font-size:12px;color:var(--t2);background:var(--s2);border-radius:7px;padding:10px;margin-top:8px"><span>P&L Lordo: <span class="mono gr-text">${fmtEur(res.plFinal)}</span></span><span>Minus comp.: <span class="mono yl-text">${totalSel?'-'+fmt(totalSel)+'€':'—'}</span></span><span>Base imp.: <span class="mono">${fmt(baseImp)}€</span></span><span>Tasse 26%: <span class="mono rd-text">${tax?'-'+fmt(tax)+'€':'—'}</span></span></div><div style="font-size:13px;font-weight:700;margin-top:6px;padding:8px;background:var(--s2);border-radius:7px">P&L Netto stimato: <span class="mono ${plClass(netto)}">${fmtEur(netto)}</span></div>`;
}

function toggleMinusRow(minusId, ordineId){
  const cb=document.getElementById('mcb_'+minusId);
  const amt=document.getElementById('mamt_'+minusId);
  if(!cb||!amt)return;
  amt.disabled=!cb.checked;
  if(!cb.checked)amt.value='';
  updateMinusPreview(ordineId);
}

function submitMinusCompNew(ordineId){
  const forO=S.ordini.find(x=>x.id===ordineId)||{};
  const avail=getAvailableMinusvalenze(ordineId);
  const refs=[];
  let total=0;
  avail.forEach(m=>{
    const cb=document.getElementById('mcb_'+m.id);
    const amt=document.getElementById('mamt_'+m.id);
    if(cb&&cb.checked&&amt){
      const v=nn(amt.value)||0;
      if(v>0){refs.push({id:m.id,symbol:m.symbol,importo:v});total+=v;}
    }
  });
  updOrdine(ordineId,{minus_compensata:total||null,minus_refs:JSON.stringify(refs)});
  closeM();
}

  const forO=S.ordini.find(x=>x.id===ordineId)||{};
  const res=calcOrdine(forO);
  if(res.stato!=='chiuso'||!res.plFinal||res.plFinal<=0) return '';
  const avail=getAvailableMinusvalenze(ordineId);
  if(avail.length===0) return `<div style="background:var(--yl-dim);border:1px solid rgba(245,197,66,.2);border-radius:8px;padding:14px;margin-top:14px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--yl);margin-bottom:6px">📉 Compensazione Minusvalenze</div><div class="dim" style="font-size:12px">Nessuna minusvalenza disponibile. Le minusvalenze vengono generate dagli ordini chiusi in perdita.</div></div>`;
  
  let curRefs=[];try{curRefs=JSON.parse(forO.minus_refs||'[]');}catch(e){}
  // Raggruppa per broker

  avail.forEach(m=>{if(!byBroker[m.piattaforma])byBroker[m.piattaforma]=[];byBroker[m.piattaforma].push(m);});

  const rows=Object.entries(byBroker).map(([broker,items])=>{

      <td colspan="8" style="padding:7px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--bl)">${esc(broker)}</td>
    </tr>`;
    const itemRows=items.map(m=>{
      const ref=curRefs.find(r=>r.id===m.id);
      const checked=!!ref;
      const val=ref?ref.importo:'';
      return `<tr>
        <td style="padding:8px 10px"><input type="checkbox" id="mcb_${m.id}" ${checked?'checked':''} onchange="toggleMinusRow('${m.id}','${ordineId}')"></td>
        <td style="padding:8px 10px"><strong>${esc(m.symbol)}</strong></td>
        <td style="padding:8px 10px" class="mono dim">${m.year} <span class="dim" style="font-size:10px">(scade ${m.scade})</span></td>
        <td style="padding:8px 10px" class="mono rd-text">-${fmt(m.totalLoss)}€</td>
        <td style="padding:8px 10px"><span class="mono ${m.available<m.totalLoss?'yl-text':'rd-text'}">-${fmt(m.available)}€${m.usedByOthers>0?` <span class="dim" style="font-size:10px">(${fmt(m.usedByOthers)}€ usati altrove)</span>`:''}</span></td>
        <td style="padding:8px 10px"><input type="number" id="mamt_${m.id}" step="0.01" min="0" max="${m.available}" value="${val}" ${checked?'':'disabled'} style="width:100px;padding:6px 8px;border-radius:6px;border:1px solid var(--b1);background:var(--s2);color:var(--t1);font-family:var(--font-mono);font-size:12px" oninput="updateMinusPreview('${ordineId}')"></td>
        <td style="padding:8px 10px"><button class="btn btn-sm btn-gh" onclick="setMaxMinus('${m.id}','${ordineId}')" title="Usa il massimo compensabile">Max</button></td>
      </tr>`;
    }).join('');
    return brokerHeader+itemRows;
  }).join('');
  
  return `<div style="background:var(--yl-dim);border:1px solid rgba(245,197,66,.2);border-radius:8px;padding:14px;margin-top:14px">
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--yl);margin-bottom:10px">📉 Compensazione Minusvalenze — Seleziona</div>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:rgba(0,0,0,.1)">
        <th style="padding:6px 10px;text-align:left;font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.08em"></th>
        <th style="padding:6px 10px;text-align:left;font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.08em">Symbol</th>
        <th style="padding:6px 10px;text-align:left;font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.08em">Anno</th>
        <th style="padding:6px 10px;text-align:left;font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.08em">Loss Totale</th>
        <th style="padding:6px 10px;text-align:left;font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.08em">Disponibile</th>
        <th style="padding:6px 10px;text-align:left;font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.08em">Importo da usare</th>
        <th style="padding:6px 10px;text-align:left;font-size:10px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.08em"></th>
      </tr></thead>
      <tbody style="border-top:1px solid rgba(245,197,66,.2)">${rows}</tbody>
    </table>
    <div id="minusPreviewRow"></div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn btn-yl" onclick="submitMinusCompNew('${ordineId}')">✓ Applica compensazione</button>
      <button class="btn btn-gh" onclick="updOrdine('${ordineId}',{minus_compensata:null,minus_refs:'[]'});closeM()">✕ Rimuovi tutto</button>
    </div>
    <div style="font-size:11px;color:var(--yl);margin-top:8px;opacity:.8">Puoi usare importi parziali — non devi necessariamente compensare l'intera perdita in un solo trade.</div>
    <div style="font-size:10px;color:var(--t3);margin-top:4px">${getRegime(forO.piattaforma)==='amministrato'?'Regime amministrato (Fineco): compensazione solo tra operazioni Fineco':'Regime dichiarativo: compensazione tra TradeZero, IBKR e Degiro'}</div>
  </div>`;
}


function setMaxMinus(minusId, ordineId){
  const forO=S.ordini.find(x=>x.id===ordineId)||{};
  const res=calcOrdine(forO);
  const avail=getAvailableMinusvalenze(ordineId);
  const m=avail.find(x=>x.id===minusId);
  if(!m||!res.plFinal)return;
  // Somma già selezionata dalle ALTRE righe
  let alreadySel=0;
  avail.forEach(other=>{
    if(other.id===minusId)return;
    const cb=document.getElementById('mcb_'+other.id);
    const amt=document.getElementById('mamt_'+other.id);
    if(cb&&cb.checked&&amt)alreadySel+=nn(amt.value)||0;
  });
  // Base imponibile residua = plFinal - già selezionato
  const remainingBase=Math.max(0,(res.plFinal||0)-alreadySel);
  // Max = min(perdita totale, base imponibile residua)
  const maxVal=Math.min(m.available, remainingBase);
  const input=document.getElementById('mamt_'+minusId);
  const cb=document.getElementById('mcb_'+minusId);
  if(input&&cb){cb.checked=true;input.disabled=false;input.value=maxVal.toFixed(2);updateMinusPreview(ordineId);}
}

function getCompensatedStatus(lossOrdineId, totalLoss){
  let applied=0;
  S.ordini.forEach(o=>{
    if(o.id===lossOrdineId)return;
    try{const refs=JSON.parse(o.minus_refs||'[]');const r=refs.find(x=>x.id===lossOrdineId);if(r)applied+=r.importo||0;}catch(e){}
  });
  if(applied>=totalLoss*0.999)return{status:'full',applied};
  if(applied>0)return{status:'partial',applied};
  return{status:'none',applied:0};
}


// ── SYNC STATUS ──────────────────────────────────────
let syncPending = 0;
let syncLastOk  = null;
let syncLastErr = null;

function syncStatusHTML(){
  if(!S.gasUrl) return '<span class="conn-dot err"></span><span class="footer-text">Non connesso</span>';
  if(syncPending>0) return '<span class="sync-pulse">🟡</span><span class="footer-text">Salvataggio...</span>';
  if(syncLastErr) return `<span class="sync-err">🔴</span><span class="footer-text" title="${esc(syncLastErr)}" style="cursor:help">Errore sync</span>`;
  if(syncLastOk){
    const t=syncLastOk.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    return `<span class="sync-dot">🟢</span><span class="footer-text">Salvato ${t}</span>`;
  }
  if(S.lastSync){
    const t=new Date(S.lastSync).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    return `<span class="sync-dot">🟢</span><span class="footer-text">Sync ${t}</span>`;
  }
  return '<span class="conn-dot ok"></span><span class="footer-text">Connesso</span>';
}

  const el=document.getElementById('syncIndicator');
  if(el) el.innerHTML=syncStatusHTML();
