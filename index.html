<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMFR | Trading Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a0f;--s1:#0f1219;--s2:#161b27;--s3:#1e2435;
  --b1:#252d42;--b2:#2e3850;
  --t1:#e8edf8;--t2:#8892a4;--t3:#4a5568;
  --shadow:rgba(0,0,0,.5);
  --gr:#00c896;--rd:#ff3d5a;--yl:#f5c542;--bl:#4d9eff;--pu:#a78bfa;--or:#ff8c42;
  --gr-dim:rgba(0,200,150,.12);--rd-dim:rgba(255,61,90,.12);
  --yl-dim:rgba(245,197,66,.12);--bl-dim:rgba(77,158,255,.12);--pu-dim:rgba(167,139,250,.12);
  --font-ui:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',Helvetica,Arial,sans-serif;--font-mono:'JetBrains Mono',monospace;
}
[data-theme="light"]{
  --bg:#f0f3fa;--s1:#fff;--s2:#f5f7fc;--s3:#eaeef8;
  --b1:#d6dce8;--b2:#c4ccd8;--t1:#141825;--t2:#5a6278;--t3:#9aa0b0;--shadow:rgba(0,0,0,.1);
  --gr:#009e76;--rd:#e0203c;--yl:#c89500;--bl:#1a7de0;--pu:#7c5ce4;--or:#d4621a;
  --gr-dim:rgba(0,158,118,.1);--rd-dim:rgba(224,32,60,.1);--yl-dim:rgba(200,149,0,.1);--bl-dim:rgba(26,125,224,.1);--pu-dim:rgba(124,92,228,.1);
}
body{background:var(--bg);color:var(--t1);font-family:var(--font-ui);font-size:14px;height:100vh;overflow:hidden;transition:background .2s,color .2s}
.app{display:flex;height:100vh}
.sidebar{width:224px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;overflow-y:auto;background:var(--bg)}
.main-inner{padding:28px 32px;min-height:100%}
.logo{padding:18px 22px 14px;font-size:15px;font-weight:800;letter-spacing:.08em;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--gr);box-shadow:0 0 8px var(--gr);flex-shrink:0}
.nav{flex:1;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 22px;cursor:pointer;color:var(--t2);transition:all .15s;border-left:2px solid transparent;font-size:13px;font-weight:600}
.nav-item:hover{color:var(--t1);background:var(--s2)}
.nav-item.active{color:var(--t1);background:var(--s2);border-left-color:var(--bl)}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--bl);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.sidebar-footer{padding:12px 22px;border-top:1px solid var(--b1);display:flex;align-items:center;gap:8px}
.conn-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.conn-dot.ok{background:var(--gr)}.conn-dot.err{background:var(--rd)}
.footer-text{font-size:11px;color:var(--t3);flex:1}
.icon-btn{background:var(--s2);border:1px solid var(--b1);color:var(--t2);font-size:14px;width:28px;height:28px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.icon-btn:hover{color:var(--t1)}
.login-wrap{height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative}
.login-box,.firstsetup-box{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:40px;width:380px;max-width:94vw;box-shadow:0 32px 80px var(--shadow)}
.firstsetup-box{width:420px}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.login-dot{width:10px;height:10px;border-radius:50%;background:var(--gr);box-shadow:0 0 10px var(--gr)}
.login-name{font-size:18px;font-weight:800;letter-spacing:.06em}
.login-error{background:var(--rd-dim);border:1px solid rgba(255,61,90,.2);color:var(--rd);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}
.login-btn{width:100%;padding:11px;background:var(--bl);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-ui);transition:filter .15s}
.login-btn:hover{filter:brightness(1.1)}
.login-theme-btn{position:absolute;top:16px;right:16px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.ph-title{font-size:18px;font-weight:700;letter-spacing:.01em;font-family:var(--font-ui)}
.ph-sub{font-size:12px;color:var(--t2);margin-top:2px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:16px 18px;transition:box-shadow .2s}
.stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);margin-bottom:8px}
.stat-val{font-size:22px;font-weight:800;font-family:var(--font-mono)}
.stat-sub{font-size:11px;color:var(--t2);margin-top:4px}
.stat-val.gr{color:var(--gr)}.stat-val.rd{color:var(--rd)}.stat-val.bl{color:var(--bl)}.stat-val.yl{color:var(--yl)}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;margin-bottom:16px;overflow:hidden;box-shadow:0 1px 3px var(--shadow)}
.card-head{padding:13px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t2)}
.card-body{padding:18px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:var(--s2);color:var(--t3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:10px 14px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--b1)}
td{padding:10px 14px;border-bottom:1px solid var(--b1);vertical-align:middle;font-size:13px}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--s2)}
.mono{font-family:var(--font-mono);font-size:12px}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap}
.bg{background:var(--gr-dim);color:var(--gr)}.br{background:var(--rd-dim);color:var(--rd)}
.by{background:var(--yl-dim);color:var(--yl)}.bb{background:var(--bl-dim);color:var(--bl)}
.bp{background:var(--pu-dim);color:var(--pu)}.bgr{background:var(--s3);color:var(--t2)}
.bo{background:rgba(255,140,66,.12);color:var(--or)}
.btn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:700;transition:all .15s;font-family:var(--font-ui);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}.btn:active{transform:none}
.btn-pr{background:var(--bl);color:#fff}.btn-gr{background:var(--gr);color:#000}
.btn-rd{background:var(--rd);color:#fff}.btn-gh{background:var(--s2);color:var(--t1);border:1px solid var(--b1)}
.btn-yl{background:var(--yl);color:#000}.btn-sm{padding:5px 11px;font-size:11px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t2);margin-bottom:5px}
input,select,textarea{background:var(--s2);border:1px solid var(--b1);color:var(--t1);padding:9px 12px;border-radius:7px;width:100%;font-size:13px;font-family:var(--font-ui);transition:border .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--bl)}
select option{background:var(--s1)}
.input-hint{font-size:10px;color:var(--t3);margin-top:4px}
.gr2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.gr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.gr4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:40px}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t2);cursor:pointer;font-size:16px;padding:4px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:14px;width:680px;max-width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 24px 80px var(--shadow)}
.modal-wide{width:860px}
.modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--s1);z-index:1}
.modal-title{font-size:16px;font-weight:800}
.modal-close{background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer;line-height:1;padding:2px 6px;border-radius:4px}
.modal-close:hover{color:var(--t1);background:var(--s2)}
.modal-body{padding:20px 24px}
.modal-foot{padding:14px 24px;border-top:1px solid var(--b1);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--s1)}
.alert{padding:11px 15px;border-radius:8px;font-size:13px;margin-bottom:14px;line-height:1.5}
.al-info{background:var(--bl-dim);border:1px solid rgba(77,158,255,.2);color:var(--bl)}
.al-warn{background:var(--yl-dim);border:1px solid rgba(245,197,66,.2);color:var(--yl)}
.al-danger{background:var(--rd-dim);border:1px solid rgba(255,61,90,.2);color:var(--rd)}
.al-success{background:var(--gr-dim);border:1px solid rgba(0,200,150,.2);color:var(--gr)}
.gr-text{color:var(--gr)}.rd-text{color:var(--rd)}.yl-text{color:var(--yl)}.bl-text{color:var(--bl)}.dim{color:var(--t2)}
.flex{display:flex}.gap1{gap:4px}.gap2{gap:8px}.gap3{gap:12px}.ai{align-items:center}.jb{justify-content:space-between}.fw{flex-wrap:wrap}
.empty{text-align:center;padding:48px;color:var(--t3);font-size:13px}
.tag{display:inline-flex;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;background:var(--s3);color:var(--t2);letter-spacing:.04em}
.platform-tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;background:var(--s3);color:var(--t1)}
.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--b1)}
.section-title:first-child{margin-top:0}
.setup-wrap{max-width:580px;margin:0 auto}
.step-list{counter-reset:step;list-style:none}
.step-list li{counter-increment:step;display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--b1);color:var(--t2);font-size:13px;line-height:1.5}
.step-list li::before{content:counter(step);background:var(--bl);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.step-list li:last-child{border-bottom:none}
code{background:var(--s3);padding:2px 6px;border-radius:4px;font-family:var(--font-mono);font-size:11px;color:var(--yl)}
.risultati-box{background:var(--s2);border-radius:10px;padding:16px;margin-top:14px}
.risultati-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.ris-item{background:var(--s1);border-radius:7px;padding:10px 12px;border:1px solid var(--b1)}
.ris-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:4px}
.ris-val{font-size:14px;font-weight:700;font-family:var(--font-mono)}
.uscite-table{width:100%;border-collapse:collapse;margin-top:8px}
.uscite-table th{background:var(--s3);color:var(--t3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:8px 10px;text-align:left}
.uscite-table td{padding:8px 10px;border-bottom:1px solid var(--b1);font-size:12px;vertical-align:middle}
.uscite-table tr:last-child td{border-bottom:none}
.override-wrap{background:var(--yl-dim);border:1px solid rgba(245,197,66,.2);border-radius:8px;padding:12px;margin-top:12px}
.override-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--yl);margin-bottom:8px}
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
@keyframes pulse-gr{0%,100%{box-shadow:0 0 0 0 rgba(0,200,150,.6)}70%{box-shadow:0 0 0 6px rgba(0,200,150,0)}}
@keyframes pulse-yl{0%,100%{box-shadow:0 0 0 0 rgba(245,197,66,.6)}70%{box-shadow:0 0 0 6px rgba(245,197,66,0)}}
@keyframes pulse-rd{0%,100%{box-shadow:0 0 0 0 rgba(255,61,90,.6)}70%{box-shadow:0 0 0 6px rgba(255,61,90,0)}}
.sig-light{width:9px;height:9px;border-radius:50%;flex-shrink:0;display:inline-block}
.sig-light.green{background:var(--gr);animation:pulse-gr 1.5s infinite}
.sig-light.yellow{background:var(--yl);animation:pulse-yl 2s infinite}
.sig-light.red{background:var(--rd);animation:pulse-rd 1.8s infinite}
.sig-light.grey{background:var(--t3)}
@keyframes syncpulse{0%,100%{opacity:1}50%{opacity:.35}}
.sync-pulse{animation:syncpulse 1.2s ease-in-out infinite;display:inline-block;font-size:13px}
.sync-dot{font-size:13px}
.sync-err{animation:syncpulse .8s ease-in-out infinite;display:inline-block;font-size:13px}
/* ── MOBILE LAYOUT ────────────────────────────────── */
@media(max-width:768px){
  /* App layout: vertical with bottom nav */
  .app{flex-direction:column;height:100vh;height:100dvh}

  /* Hide desktop sidebar */
  .sidebar{display:none}

  /* Main scrolls in remaining space above bottom nav */
  .main{flex:1;overflow-y:auto;padding-bottom:72px}
  .main-inner{padding:14px 12px}

  /* Bottom navigation bar */
  .mobile-nav{
    display:flex!important;
    position:fixed;bottom:0;left:0;right:0;
    height:64px;
    background:var(--s1);
    border-top:1px solid var(--b1);
    z-index:100;
    align-items:stretch;
    padding:0 4px;
    padding-bottom:env(safe-area-inset-bottom,0px);
  }
  .mobile-nav-item{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;cursor:pointer;color:var(--t3);transition:color .15s;
    padding:6px 2px;border:none;background:none;font-family:var(--font-ui);
    position:relative;
  }
  .mobile-nav-item.active{color:var(--bl)}
  .mobile-nav-item .nav-icon{font-size:20px;line-height:1}
  .mobile-nav-item span{font-size:9px;font-weight:600;letter-spacing:.03em;text-transform:uppercase}
  .mobile-nav-badge{
    position:absolute;top:4px;right:calc(50% - 18px);
    background:var(--bl);color:#fff;
    font-size:9px;font-weight:700;
    min-width:16px;height:16px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    padding:0 4px;
  }

  /* Page header */
  .ph{margin-bottom:16px}
  .ph-title{font-size:17px}
  .ph-sub{font-size:11px}

  /* Stat cards: 2 columns */
  .stats-grid{grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
  .stat{padding:12px 14px}
  .stat-val{font-size:18px}
  .stat-label{font-size:9px;margin-bottom:5px}

  /* Grids collapse */
  .gr2,.gr3,.gr4{grid-template-columns:1fr}

  /* Cards */
  .card{margin-bottom:12px}
  .card-body{padding:14px}

  /* Tables: horizontal scroll */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{min-width:500px}
  th,td{padding:8px 10px;font-size:12px}

  /* Signal rows as cards on mobile */
  .sig-card-list{display:flex;flex-direction:column;gap:10px}
  .sig-card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:14px;position:relative}
  .sig-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .sig-card-symbol{font-size:17px;font-weight:800}
  .sig-card-body{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .sig-card-item .label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:2px}
  .sig-card-item .value{font-size:13px;font-weight:600;font-family:var(--font-mono)}
  .sig-card-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}

  /* Order rows as cards on mobile */
  .ord-card-list{display:flex;flex-direction:column;gap:10px}
  .ord-card{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:14px}
  .ord-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .ord-card-body{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .ord-card-item .label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:2px}
  .ord-card-item .value{font-size:13px;font-weight:600;font-family:var(--font-mono)}
  .ord-card-actions{display:flex;gap:6px;margin-top:10px}

  /* Touch-friendly buttons */
  .btn{min-height:40px;padding:8px 14px}
  .btn-sm{min-height:36px;padding:6px 12px;font-size:12px}

  /* Modals full screen on mobile */
  .ov{padding:0;align-items:flex-end}
  .modal,.modal-wide{
    width:100%;max-width:100%;
    border-radius:18px 18px 0 0;
    max-height:92vh;max-height:92dvh;
  }
  .modal-head{padding:16px 18px 12px}
  .modal-body{padding:16px 18px}
  .modal-foot{padding:12px 18px 18px}

  /* Form inputs touch-friendly */
  input,select,textarea{
    padding:12px 14px;font-size:16px!important;
    min-height:48px;
  }
  select{min-height:48px}
  .form-group label{font-size:11px}

  /* Hide desktop sync indicator in mobile nav context */
  .sidebar-footer{display:none}

  /* Mobile sync bar at top */
  .mobile-sync-bar{
    display:flex!important;
    align-items:center;justify-content:space-between;
    padding:6px 12px;
    background:var(--s1);
    border-bottom:1px solid var(--b1);
    font-size:11px;color:var(--t2);
    position:sticky;top:0;z-index:50;
  }
  .mobile-sync-bar .flex{gap:8px}
}

/* Desktop: hide mobile-only elements */
@media(min-width:769px){
  .mobile-nav{display:none!important}
  .mobile-sync-bar{display:none!important}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const PLATFORMS=['TradeZero','IBKR','Degiro','Fineco'];
const MARKETS=['Azioni','Crypto','Materie Prime','Forex'];
const STRATEGIES=['EK Investing','Personale'];
const TAX_RATE=0.26;
const FINECO='Fineco';
const DICHIARATIVO=['TradeZero','IBKR','Degiro'];
function getRegime(broker){return DICHIARATIVO.includes(broker)?'dichiarativo':'amministrato';}
const STATI_SIG={
  ricevuto:   {l:'Ricevuto',   cls:'bgr',ic:'📨'},
  attivato:   {l:'Attivato',   cls:'by', ic:'⚡'},
  aperto:     {l:'Aperto',     cls:'bb', ic:'📈'},
  chiuso_tp:  {l:'TP ✓',      cls:'bg', ic:'✅'},
  chiuso_stop:{l:'Stop Loss',  cls:'br', ic:'🛑'},
  chiuso_man: {l:'Chiuso',     cls:'bp', ic:'🔒'},
  scartato:   {l:'Scartato',   cls:'bgr',ic:'✕'},
  invalidato: {l:'Invalidato', cls:'br', ic:'⛔'},
  riattivato: {l:'Riattivato', cls:'by', ic:'🔄'},
  eliminato:  {l:'Eliminato',  cls:'bgr',ic:'✗'},
};
const CHIUSI_SIG=new Set(['chiuso_tp','chiuso_stop','chiuso_man']);

let S={
  tab:'dashboard',theme:localStorage.getItem('ek_theme')||'dark',
  gasUrl:localStorage.getItem('ek_gas')||'',pwd:localStorage.getItem('ek_pwd')||'',
  unlocked:sessionStorage.getItem('ek_auth')==='1',loginErr:false,
  signals:JSON.parse(localStorage.getItem('ek_segnali')||'[]'),
  trades:JSON.parse(localStorage.getItem('ek_trades')||'[]'),
  ordini:JSON.parse(localStorage.getItem('ek_ordini')||'[]'),
  loading:false,modal:null,filterSeg:'tutti',filterOrd:'tutti',
  lastSync:localStorage.getItem('ek_sync')||null,syncErr:null
};
document.documentElement.setAttribute('data-theme',S.theme);

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const today=()=>new Date().toISOString().split('T')[0];

function calcOrdine(o){
  const uscite=JSON.parse(o.uscite||'[]');
  const entryP=nn(o.entry_price)||0,posSize=nn(o.position_size)||0,invEur=nn(o.investito_eur)||0,stopP=nn(o.stop_loss)||0;
  const buyAmount=entryP*posSize;
  const qtyExited=uscite.reduce((s,u)=>s+(nn(u.quantity)||0),0);
  const sellAmount=uscite.reduce((s,u)=>s+(nn(u.exit_price)||0)*(nn(u.quantity)||0),0);
  const totalComm=uscite.reduce((s,u)=>s+(nn(u.commission_eur)||0),0);
  const buyExited=entryP*qtyExited;
  const plUSD=o.position==='Long'?sellAmount-buyExited:buyExited-sellAmount;
  let plEur=null;
  if(buyAmount&&invEur&&qtyExited&&posSize){
    const fraz=qtyExited/posSize;
    const costoAcquistoEUR=invEur*fraz; // costo reale in EUR al cambio d'acquisto
    const eurusd=getEURUSD();
    if(eurusd&&sellAmount&&qtyExited>0){
      // Formula Fineco-equivalente per trade chiusi:
      // valore_vendita_EUR = sellAmount_USD / EURUSD_ora
      // P&L = valore_vendita_EUR - costo_acquisto_EUR
      const valoreVenditaEUR=sellAmount/eurusd;
      plEur=valoreVenditaEUR-costoAcquistoEUR-totalComm;
    } else {
      // Fallback: proporzionale sull'investito
      const pct=buyExited?plUSD/buyExited:0;
      plEur=invEur*fraz*pct-totalComm;
    }
  }
  // Se almeno un'uscita ha pl_override reale, usalo invece del calcolato
  const hasUscitaOvr=uscite.some(u=>nn(u.pl_override)!==null);
  let plEurReal=null;
  if(hasUscitaOvr&&invEur&&posSize){
    plEurReal=uscite.reduce((sum,u)=>{
      const qU=nn(u.quantity)||0,epU=nn(u.exit_price)||0,cU=nn(u.commission_eur)||0;
      if(nn(u.pl_override)!==null)return sum+nn(u.pl_override);
      const buyU=entryP*qU,sellU=epU*qU,plU=o.position==='Long'?sellU-buyU:buyU-sellU;
      return sum+invEur*(qU/posSize)*(buyU?plU/buyU:0)-cU;
    },0);
  }
  const plOverride=nn(o.pl_override);
  const plFinal=plOverride!==null?plOverride:(plEurReal!==null?plEurReal:plEur);
  const invFraz=invEur&&posSize&&qtyExited?invEur*(qtyExited/posSize):null;
  const plPct=invFraz&&plFinal!==null?plFinal/invFraz*100:null;
  let duration=null;
  if(uscite.length>0&&o.entry_datetime){const lastExit=uscite.map(u=>u.exit_datetime).filter(Boolean).sort().pop();if(lastExit)duration=Math.round((new Date(lastExit)-new Date(o.entry_datetime))/(1000*60*60*24));}
  const maxLossUSD=stopP&&entryP&&posSize?Math.abs(entryP-stopP)*posSize:null;
  const maxLossEur=maxLossUSD&&buyAmount&&invEur?invEur*(maxLossUSD/buyAmount):null;
  const rMultiple=plFinal!==null&&maxLossEur?(plFinal/maxLossEur).toFixed(2):null;
  const qtyRem=posSize-qtyExited;
  const stato=qtyRem<=0?'chiuso':qtyExited>0?'parziale':'aperto';
  const minusComp=Math.max(0,nn(o.minus_compensata)||0);
  const baseImp=plFinal!==null?Math.max(0,plFinal-minusComp):null;
  const tax=baseImp!==null&&baseImp>0?baseImp*TAX_RATE:0;
  // Giorni aperti (da entry a oggi se ancora aperto, o all'ultima uscita se chiuso)
  let daysOpen=null;
  if(o.entry_datetime){
    const entryD=new Date(o.entry_datetime);
    let toDate;
    if(stato==='chiuso'&&uscite.length>0){
      const lastExit=uscite.map(u=>u.exit_datetime).filter(Boolean).sort().pop();
      toDate=lastExit?new Date(lastExit):new Date();
    } else {
      toDate=new Date();
    }
    daysOpen=Math.round((toDate-entryD)/(1000*60*60*24));
  }
  return{buyAmount,sellAmount,qtyExited,qtyRem,plUSD,plEur,plFinal,plPct,totalComm,duration:daysOpen,daysOpen,maxLossEur,rMultiple,minusComp,baseImp,tax,stato};
}

function gasUrlWith(extra){return S.gasUrl+'?token='+encodeURIComponent(S.pwd)+(extra?'&'+extra:'');}
function mergeByTs(local,remote){
  // Per ogni record usa la versione più recente (confronta timestamp updated/created)
  const result=[...remote];
  const repush=[];
  local.forEach(loc=>{
    const ri=result.findIndex(r=>r.id===loc.id);
    if(ri===-1){result.push(loc);repush.push(loc);}
    else{
      const lt=new Date(loc.updated||loc.created||0);
      const rt=new Date(result[ri].updated||result[ri].created||0);
      if(lt>=rt){result[ri]=loc;repush.push(loc);} // locale vince a parità di timestamp
      else {
        // GAS è più recente MA preserva i campi locali non-null che GAS non conosce
        const preserved=['tp_livello','stop_loss','entry_datetime','minus_compensata','minus_refs','stop_counter','stop_history'];
        let changed=false;
        preserved.forEach(f=>{
          if((loc[f]!==null&&loc[f]!==undefined&&loc[f]!=='')&&(result[ri][f]===null||result[ri][f]===undefined||result[ri][f]==='')) {
            result[ri][f]=loc[f];changed=true;
          }
        });
        if(changed)repush.push(result[ri]);
      }
    }
  });
  return{merged:result,repush};
}

async function gasRead(){
  if(!S.gasUrl||!S.pwd)return;
  S.loading=true;S.syncErr=null;render();
  try{
    const r=await fetch(gasUrlWith('action=read'));
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d.error)throw new Error(d.error);

    // Merge intelligente: mantiene la versione più recente per ogni record
    if(Array.isArray(d.signals)){const{merged,repush}=mergeByTs(S.signals,d.signals);S.signals=merged;repush.forEach(s=>gasWrite('signal','update',s));}
    if(Array.isArray(d.trades)) {const{merged,repush}=mergeByTs(S.trades,d.trades);S.trades=merged;repush.forEach(t=>gasWrite('trade','update',t));}
    if(Array.isArray(d.ordini)) {const{merged,repush}=mergeByTs(S.ordini,d.ordini);S.ordini=merged;repush.forEach(o=>gasWrite('ordine','update',o));}

    S.lastSync=new Date().toISOString();localStorage.setItem('ek_sync',S.lastSync);persist();
  }catch(e){S.syncErr=e.message;syncLastErr=e.message;updateSyncBadge();}
  finally{S.loading=false;render();}
  // Fetch live prices after sync
  fetchPrezziLive();
}
async function gasWrite(type,op,record){if(!S.gasUrl||!S.pwd)return;syncPending++;updateSyncBadge();try{const r=await fetch(gasUrlWith(`action=write&type=${type}&op=${op}&record=${encodeURIComponent(JSON.stringify(record))}`));let d={};try{d=await r.json();}catch(e){}if(d&&d.error)throw new Error(d.error);syncLastOk=new Date();syncLastErr=null;}catch(e){syncLastErr=e.message;}finally{syncPending=Math.max(0,syncPending-1);updateSyncBadge();}}

  <thead><tr><th>Data</th><th>Ticker</th><th>MKT</th><th>Dir.</th><th>Entry</th><th>Entry±M</th><th>Stop</th><th>Stop±M</th><th>TP1</th><th>%→TP</th><th>%→Stop</th><th>Prezzo Live</th><th>Dist. Entry</th><th>Valido</th><th>Sorgente</th><th>Stop #</th><th>Stato</th><th>Azioni</th></tr></thead>
  <tbody>${list.length===0?`<tr><td colspan="10" class="empty">Nessun segnale</td></tr>`:''}
  ${list.map(s=>{const pTp=movePct(s.direzione,nn(s.entrata_margine),nn(s.tp1));const pSt=movePct(s.direzione,nn(s.entrata_margine),nn(s.stop_margine));const acts=[];if(s.stato==='ricevuto')acts.push(`<button class="btn btn-sm btn-gh" onclick="openM('activateSig',{id:'${s.id}'})">Attiva</button>`);if(s.stato==='attivato'){acts.push(`<button class="btn btn-sm btn-pr" onclick="openM('openOrdineFromSig',{sigId:'${s.id}'})">Apri Ordine</button>`);acts.push(`<button class="btn btn-sm btn-gh" onclick="updSig('${s.id}',{stato:'scartato'})">Scarta</button>`);}
        if(s.stato==='riattivato'){acts.push(`<button class="btn btn-sm btn-pr" onclick="openM('openOrdineFromSig',{sigId:'${s.id}'})">Apri Ordine</button>`);}
        if(s.stato==='invalidato'){acts.push(`<span class="dim" style="font-size:11px">⏳ Attesa riattivazione</span>`);}
        if(s.stato==='eliminato'){acts.push(`<span class="dim" style="font-size:11px;text-decoration:line-through">Eliminato (${s.stop_counter||2}/2)</span>`);}acts.push(`<button class="btn btn-sm btn-gh" onclick="openM('editSig',{id:'${s.id}'})">✏</button>`);
        acts.push(`<button class="btn btn-sm btn-gh" style="color:var(--rd)" onclick="if(confirm('Eliminare il segnale ${esc(s.ticker)}?'))delSignal('${s.id}')">✕</button>`);const validoBadge=s.valido==='Si'?`<span class="badge bg" style="font-size:10px">✓ Sì</span>`:`<span class="badge br" style="font-size:10px">✗ No</span>`;
        // Dynamic light: ricevuto near entry = yellow; stop violated = red; activated = green
        const sigLightDyn=(()=>{
          if(s.stato==='eliminato')return'red'; // eliminato = rosso (2 stop)
          if(s.stato==='chiuso_stop'||s.stato==='invalidato')return'red';
          if(s.stato==='attivato'||s.stato==='aperto')return'green';
          if(s.stato==='riattivato')return'yellow';
          if(s.stato==='scartato'||s.stato==='chiuso_tp'||s.stato==='chiuso_man')return'grey';
          // ricevuto: verde se sopra entry, giallo se entro 7%, grigio se lontano
          const lp=S_prezzi[s.ticker]||null;
          const em=nn(s.entrata_margine)||nn(s.entrata);
          if(lp&&em){
            const dist=(s.direzione==='BUY'?lp-em:em-lp)/em*100;
            if(dist>=0)return'green';       // già sopra entry
            if(dist>=-7)return'yellow';     // entro 7% sotto entry
          }
          return'grey';
        })();
        const sorgBadge=s.sorgente==='Personale'?`<span class="badge bp" style="font-size:10px">Personal</span>`:`<span class="badge bb" style="font-size:10px">EK</span>`;
        return `<tr style="${s.stato==='eliminato'?'opacity:.4;text-decoration:line-through':''}""><td class="dim mono">${fmtDate(s.data_segnale)}</td><td><div class="flex ai gap2"><span class="sig-light ${sigLightDyn}"></span><strong>${esc(s.ticker)}</strong></div></td><td><span class="tag">${esc(s.market||'')}</span></td><td>${dirBadge(s.direzione)}</td><td class="mono dim">${s.entrata?fmt(s.entrata):'—'}</td><td class="mono">${fmt(s.entrata_margine)}</td><td class="mono dim">${s.sl1?fmt(s.sl1):'—'}</td><td class="mono rd-text">${fmt(s.stop_margine)}</td><td class="mono gr-text">${s.tp1?fmt(s.tp1):s.tp2?fmt(s.tp2):'—'}</td><td class="mono gr-text">${pTp?fmtPct(pTp):'—'}</td><td class="mono rd-text">${pSt?fmtPct(pSt):'—'}</td>${(()=>{
          const lp=S_prezzi[s.ticker]||null;
          const em=nn(s.entrata_margine)||nn(s.entrata);
          const de=lp&&em?((s.direzione==='BUY'?lp-em:em-lp)/em*100):null;
          const condMet=de!==null&&de>=0;
          return `<td>${lp?`<span class="mono ${condMet?'gr-text':''}">${fmtP(lp)}</span>`:'<span class="dim">—</span>'}</td>
          <td>${de!==null?`<span class="mono ${plClass(de)}">${fmtPct(de)}</span>`:'<span class="dim">—</span>'}</td>`;
        })()}
        <td>${validoBadge}</td><td>${sorgBadge}</td><td>${s.stop_counter>0?`<span class="badge ${s.stop_counter>=2?'br':'by'}">${s.stop_counter}/2</span>`:'<span class="dim">—</span>'}</td><td style="${s.stato==='eliminato'?'text-decoration:line-through;opacity:.5':''}">${badgeSig(s.stato)}</td><td><div class="flex gap1">${acts.join('')}</div></td></tr>`;}).join('')}
  </tbody></table></div></div>`;
}

function viewOrdini(){
  const filter=S.filterOrd;
  const sortByDate=(arr)=>[...arr].sort((a,b)=>{
    const da=new Date(a.entry_datetime||a.created||0);
    const db=new Date(b.entry_datetime||b.created||0);
    return db-da; // più recente prima
  });
  const filteredOrdini=sortByDate(filter==='tutti'?S.ordini:filter==='aperti'?S.ordini.filter(o=>o.stato==='aperto'||o.stato==='parziale'):S.ordini.filter(o=>o.stato===filter));
  const tabs=[{k:'tutti',l:'Tutti',n:S.ordini.length},{k:'aperti',l:'Aperti / Parziali',n:openOrdini().length},{k:'chiuso',l:'Chiusi',n:closedOrdini().length}];
  return `<div class="ph"><div class="ph-title">Ordini</div><button class="btn btn-pr" onclick="openM('addOrdine',{})">+ Nuovo Ordine</button></div>
  <div class="filter-tabs">${tabs.map(t=>`<button class="btn btn-sm ${filter===t.k?'btn-pr':'btn-gh'}" onclick="S.filterOrd='${t.k}';render()">${t.l} <span style="opacity:.6">${t.n}</span></button>`).join('')}</div>
  <div class="card" style="padding:0"><div class="tbl-wrap"><table>
  <thead><tr><th>Data</th><th>Symbol</th><th>Market</th><th>Pos.</th><th>Strategia</th><th>Piattaforma</th><th>Entry $</th><th>Stop $</th><th>TP $</th><th>Size</th><th>Investito €</th><th>Giorni</th><th>P&L €</th><th>P&L%</th><th>Stato</th><th>Azioni</th></tr></thead>
  <tbody>${filteredOrdini.length===0?`<tr><td colspan="13" class="empty">Nessun ordine</td></tr>`:''}
  ${filteredOrdini.map((o)=>{
    const res=calcOrdine(o);
    const plD=res.plFinal!==null?`<span class="badge ${res.plFinal>=0?'bg':'br'}">${fmtEur(res.plFinal)}</span>`:'<span class="dim">—</span>';
    const pctD=res.plPct!==null?`<span class="mono ${plClass(res.plPct)}">${fmtPct(res.plPct)}</span>`:'—';
    const ovrIcon=nn(o.pl_override)!==null?`<span class="badge by" style="padding:1px 5px;font-size:9px">OVR</span>`:'';
    const daysLabel=res.daysOpen!==null?`<span class="mono dim">${res.daysOpen}g</span>`:'<span class="dim">—</span>';
    const entryDateLabel=o.entry_datetime?fmtDate(o.entry_datetime):'<span class="dim">—</span>';
    return `<tr>
      <td class="dim mono" style="font-size:11px">${entryDateLabel}</td>
      <td><strong>${esc(o.symbol)}</strong></td>
      <td>${marketBadge(o.market||'')}</td>
      <td>${dirBadge(o.position)}</td>
      <td>${stratBadge(o.strategy)}</td>
      <td><span class="platform-tag">${esc(o.piattaforma)}</span></td>
      <td class="mono">${fmt(o.entry_price)}</td>
      <td class="mono rd-text" style="font-size:11px">${o.stop_loss?fmt(o.stop_loss):'—'}</td>
      ${(()=>{const sig2=S.signals.find(s=>s.id===o.signal_id)||{};const tpEff=nn(o.tp_livello)||nn(sig2.tp1)||null;return `<td class="mono gr-text" style="font-size:11px">${tpEff?fmt(tpEff):'—'}</td>`;})()}
      <td class="dim">${o.position_size||'—'} ${res.qtyRem>0?`<span style="font-size:10px;color:var(--yl)">(${res.qtyRem} rim.)</span>`:''}</td>
      <td class="mono">${o.investito_eur?fmt(o.investito_eur)+'€':'—'}</td>
      <td>${daysLabel}</td>
      <td>${plD} ${ovrIcon}</td>
      <td>${pctD}</td>
      <td>${statoBadge(res.stato)}</td>
      <td><div class="flex gap1">
        <button class="btn btn-sm btn-gh" onclick="openM('dettaglioOrdine',{id:'${o.id}'})">Dettaglio</button>
        ${res.stato!=='chiuso'?`<button class="btn btn-sm btn-pr" onclick="openM('addUscita',{id:'${o.id}'})">+ Uscita</button>`:''}
      </div></td>
    </tr>`;
  }).join('')}</tbody></table></div></div>`;
}

  }

function collectSigForm(){const dir=document.getElementById('f_dir').value;const ent=nn(document.getElementById('f_ent').value)||0;const sl1=nn(document.getElementById('f_sl1').value)||0;const mrg=nn(document.getElementById('f_mrg').value)||0;let em=nn(document.getElementById('f_em').value);let sm=nn(document.getElementById('f_sm').value);if(!em&&ent&&mrg)em=dir==='BUY'?ent+mrg:ent-mrg;if(!sm&&sl1&&mrg)sm=dir==='BUY'?sl1-mrg:sl1+mrg;return{data_segnale:document.getElementById('f_data').value,market:document.getElementById('f_mkt').value,ticker:document.getElementById('f_ticker').value.trim().toUpperCase(),direzione:dir,entrata:ent,tp1:nn(document.getElementById('f_tp1').value),tp2:nn(document.getElementById('f_tp2').value),sl1:sl1,sl2:nn(document.getElementById('f_sl2').value),margine:mrg||null,entrata_margine:em,stop_margine:sm,link_telegram:document.getElementById('f_link').value,a_mercato:document.getElementById('f_amk').value,valido:document.getElementById('f_val').value,note_ek:document.getElementById('f_note').value,sorgente:(document.getElementById('f_sorg')||{}).value||'EK Investing'};}

function previewOrdine(){const ep=nn((document.getElementById('o_ep')||{}).value);const ps=nn((document.getElementById('o_ps')||{}).value);const inv=nn((document.getElementById('o_inv')||{}).value);const el=document.getElementById('ordinePreview');if(!el)return;if(!ep||!ps){el.innerHTML='';return;}const buyAmt=ep*ps;const sigId2=(S.modal&&S.modal.data&&S.modal.data.sigId)||(S.modal&&S.modal.data&&S.modal.data.id)||null;
  const sig2=S.signals.find(x=>x.id===sigId2)||{};
  const tpPreview=nn((document.getElementById('o_tp_livello')||{}).value)||nn(sig2.tp1)||null;
  const slPreview=nn((document.getElementById('o_sl')||{}).value)||null;
  const o_pos2=(document.getElementById('o_pos')||{}).value||'Long';
  const gainEurPreview=tpPreview&&ep&&inv?inv*((o_pos2==='Long'?(tpPreview-ep)/ep:(ep-tpPreview)/ep)):null;

function calcMinusvalenzeHTML(){
  const now=new Date(),curYear=now.getFullYear();

  // Aggrega per broker
  const byBroker={};
  S.ordini.forEach(o=>{
    const res=calcOrdine(o);
    if(res.stato!=='chiuso'||!res.plFinal||res.plFinal>=0)return;
    let year=curYear;
    try{const us=JSON.parse(o.uscite||'[]');const last=us.map(u=>u.exit_datetime).filter(Boolean).sort().pop();if(last)year=new Date(last).getFullYear();}catch(e){}
    const scade=year+4,expired=curYear-year>4;
    const disponibile=Math.abs(res.plFinal);
    const compSt=getCompensatedStatus(o.id,disponibile);

    const broker=o.piattaforma||'Altro';
    if(!byBroker[broker])byBroker[broker]={pool:0,compensated:0,remaining:0,orders:[],byYear:{}};

    if(!expired)b.pool+=disponibile;
    b.compensated+=appliedAmt;

    b.byYear[year].compensated+=appliedAmt;

  const brokers=Object.keys(byBroker);

    return `<tr>

      <td class="mono rd-text">-${fmt(b.pool)}€</td>
      <td class="mono yl-text">${b.compensated>0?'-'+fmt(b.compensated)+'€':'—'}</td>
      <td class="mono ${b.remaining>0?'yl-text':'gr-text'}">${b.remaining>0?'-'+fmt(b.remaining)+'€':'✓ Tutto compensato'}</td>
      <td style="font-size:11px">${yearSummary}</td>
      <td><button class="btn btn-sm btn-gh" onclick="openM('minusDettaglioBroker',{broker:'${esc(broker)}'})">Dettaglio →</button></td>
    </tr>`;
  }).join('');

  return `<div class="card" style="margin-top:16px">
    <div class="card-head">
      <div class="card-title">📉 Minusvalenze — Riepilogo per Broker</div>
    </div>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;font-size:12px">
        <div>Pool totale: <span class="mono rd-text">-${fmt(pool.pool)}€</span></div>

        <div>Residue: <span class="mono yl-text">-${fmt(pool.remaining)}€</span></div>
      </div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Broker</th><th>Pool</th><th>Compensate</th><th>Residue</th><th>Per Anno</th><th></th></tr></thead>

    <div style="padding:10px 18px;font-size:11px;color:var(--t3);border-top:1px solid var(--b1)">
      Clicca "Dettaglio →" per vedere gli ordini in perdita per broker · Le minusvalenze Fineco si compensano solo nel regime amministrato Fineco

function getAvailableMinusvalenze(forOrdineId){
  const now=new Date(),curY=now.getFullYear();
  const forO=S.ordini.find(x=>x.id===forOrdineId)||{};
  let curRefs=[];try{curRefs=JSON.parse(forO.minus_refs||'[]');}catch(e){}

  // Filtra per regime fiscale compatibile
  const forRegime=getRegime(forO.piattaforma);
  return S.ordini.filter(o=>o.id!==forOrdineId&&getRegime(o.piattaforma)===forRegime).map(o=>{
    const res=calcOrdine(o);
    if(res.stato!=='chiuso'||!res.plFinal||res.plFinal>=0)return null;
    let year=curY;
    try{const us=JSON.parse(o.uscite||'[]');const last=us.map(u=>u.exit_datetime).filter(Boolean).sort().pop();if(last)year=new Date(last).getFullYear();}catch(e){}
    if(curY-year>4)return null;
    const totalLoss=Math.abs(res.plFinal);

    // Quanto già usato da TUTTI gli altri ordini (escluso forOrdineId)
    let usedByOthers=0;
    S.ordini.forEach(other=>{
      if(other.id===o.id||other.id===forOrdineId)return;
      try{const refs=JSON.parse(other.minus_refs||'[]');const r=refs.find(x=>x.id===o.id);if(r)usedByOthers+=r.importo||0;}catch(e){}
    });

    // Quanto l'ordine corrente sta già usando da questa minusvalenza
    const ref=curRefs.find(r=>r.id===o.id);
    const usedByCurrent=ref?ref.importo:0;

    // Disponibile = totale - usato dagli altri (il corrente può riusarlo/modificarlo)
    const available=Math.max(0,totalLoss-usedByOthers);

    // Se già tutto esaurito dagli altri → non mostrare
    if(available<=0&&usedByCurrent<=0)return null;

    return{
      id:o.id,symbol:o.symbol,piattaforma:o.piattaforma,
      year,scade:year+4,totalLoss,
      usedByOthers,
      alreadyApplied:usedByCurrent,  // quanto usa questo ordine
      available                        // quanto rimane disponibile (incluso quello già usato da questo)
    };
  }).filter(Boolean);
}

}

function setMaxMinus(minusId, ordineId){
  const forO=S.ordini.find(x=>x.id===ordineId)||{};
  const res=calcOrdine(forO);
  const avail=getAvailableMinusvalenze(ordineId);
  const m=avail.find(x=>x.id===minusId);
  if(!m||!res.plFinal)return;
  // Somma già selezionata dalle ALTRE righe
  let alreadySel=0;
  avail.forEach(other=>{
    if(other.id===minusId)return;
    const cb=document.getElementById('mcb_'+other.id);
    const amt=document.getElementById('mamt_'+other.id);
    if(cb&&cb.checked&&amt)alreadySel+=nn(amt.value)||0;
  });
  // Base imponibile residua = plFinal - già selezionato
  const remainingBase=Math.max(0,(res.plFinal||0)-alreadySel);
  // Max = min(perdita totale, base imponibile residua)
  const maxVal=Math.min(m.available, remainingBase);
  const input=document.getElementById('mamt_'+minusId);
  const cb=document.getElementById('mcb_'+minusId);
  if(input&&cb){cb.checked=true;input.disabled=false;input.value=maxVal.toFixed(2);updateMinusPreview(ordineId);}
}

function getCompensatedStatus(lossOrdineId, totalLoss){
  let applied=0;
  S.ordini.forEach(o=>{
    if(o.id===lossOrdineId)return;
    try{const refs=JSON.parse(o.minus_refs||'[]');const r=refs.find(x=>x.id===lossOrdineId);if(r)applied+=r.importo||0;}catch(e){}
  });
  if(applied>=totalLoss*0.999)return{status:'full',applied};
  if(applied>0)return{status:'partial',applied};
  return{status:'none',applied:0};
}

function getEURUSD(){
  // Preferisce il cambio BCE (Frankfurter), poi Yahoo Finance come fallback
  return S_eurusd || S_prezzi['EURUSD=X'] || null;
}

function usdToEur(usdAmount){
  const rate=getEURUSD();
  if(!rate||!usdAmount)return null;
  return usdAmount/rate;
}

async function fetchEURUSDBCE(){
  try{
    const r=await fetch('https://api.frankfurter.app/latest?from=EUR&to=USD');
    if(!r.ok)return;
    const d=await r.json();
    if(d&&d.rates&&d.rates.USD){
      S_eurusd=d.rates.USD;
      S_eurusdTs=new Date().toISOString();
      localStorage.setItem('gmfr_eurusd',S_eurusd);
      localStorage.setItem('gmfr_eurusd_ts',S_eurusdTs);
      // Aggiorna solo il badge EURUSD nell'header senza re-render
      document.querySelectorAll('[data-eurusd-label]').forEach(el=>{
        el.textContent='EUR/USD '+fmtP(S_eurusd);
      });
    }
  }catch(e){console.warn('Frankfurter fetch failed:',e.message);}
}

async function fetchPrezziLive(){
  if(!S.gasUrl||!S.pwd)return;
  // Fetch BCE exchange rate in parallel (direct, no GAS needed)
  fetchEURUSDBCE();
  // Check market status in parallel
  fetchMarketStatus();
  // Collect all tickers: open orders + all active/received signals
  const tickers=new Set();
  S.ordini.filter(o=>o.stato==='aperto'||o.stato==='parziale').forEach(o=>{if(o.symbol)tickers.add(o.symbol);});
  S.signals.filter(s=>!['chiuso_tp','chiuso_stop','chiuso_man','scartato','eliminato'].includes(s.stato)).forEach(s=>{if(s.ticker)tickers.add(s.ticker);});
  if(tickers.size===0)return;
  try{
    const tickerList=encodeURIComponent([...tickers].join(','));
    const r=await fetch(S.gasUrl+'?token='+encodeURIComponent(S.pwd)+'&action=prezzi&tickers='+tickerList);
    if(!r.ok){console.warn('Prezzi fetch error: HTTP '+r.status);return;}
    const d=await r.json();
    if(d.error){console.warn('Prezzi GAS error:',d.error);S.syncErr='Prezzi: '+d.error;updateSyncBadge();return;}
    if(!d.prezzi){console.warn('No prezzi in response',d);return;}
    S_prezzi={...S_prezzi,...d.prezzi};
    S_prezziTs=new Date().toISOString();
    localStorage.setItem('gmfr_prezzi',JSON.stringify(S_prezzi));
    localStorage.setItem('gmfr_prezzi_ts',S_prezziTs);
    checkRiattivazioniLive();
    render();
  }catch(e){}
}

// ── STOP COUNTER LOGIC ────────────────────────────────────────
function handleStopLoss(sigId){
  const i=S.signals.findIndex(s=>s.id===sigId); if(i<0)return;
  const sig=S.signals[i];
  const counter=(sig.stop_counter||0)+1;
  const hist=JSON.parse(sig.stop_history||'[]');
  hist.push({data:new Date().toISOString(),ordine_id:sig._last_ordine_id||null});
  const newHist=JSON.stringify(hist);
  if(counter>=2){
    // Eliminato
    updSig(sigId,{stato:'eliminato',stop_counter:counter,stop_history:newHist});
  } else {
    // Invalidato (counter 1)
    updSig(sigId,{stato:'invalidato',stop_counter:counter,stop_history:newHist});
  }
}

function checkRiattivazione(sigId, prezzoCorrente){
  const sig=S.signals.find(s=>s.id===sigId); if(!sig)return;
  if(sig.stato!=='invalidato')return;
  const entry=nn(sig.entrata_margine)||nn(sig.entrata);
  if(!entry||!prezzoCorrente)return;
  const condMet=sig.direzione==='BUY'?prezzoCorrente>=entry:prezzoCorrente<=entry;
  if(condMet){
    updSig(sigId,{stato:'riattivato',riattivato_at:new Date().toISOString()});
  }
}

function checkInvalidazioneRiattivato(sigId, prezzoCorrente){
  const sig=S.signals.find(s=>s.id===sigId); if(!sig)return;
  if(sig.stato!=='riattivato')return;
  const entry=nn(sig.entrata_margine)||nn(sig.entrata);
  if(!entry||!prezzoCorrente)return;
  // Se il prezzo è tornato sotto l'entry (per BUY) → torna invalidato
  const condLost=sig.direzione==='BUY'?prezzoCorrente<entry:prezzoCorrente>entry;
  if(condLost){
    updSig(sigId,{stato:'invalidato',riattivato_at:null});
  }
}

// Chiamata dopo fetchPrezziLive — controlla riattivazioni automatiche
function checkRiattivazioniLive(){
  S.signals.forEach(s=>{
    const prezzo=S_prezzi[s.ticker]||null;
    if(!prezzo)return;
    if(s.stato==='invalidato') checkRiattivazione(s.id,prezzo);
    if(s.stato==='riattivato') checkInvalidazioneRiattivato(s.id,prezzo);
  });
}


function isUSMarketOpen(){
  // Usa stato cachato da GAS se disponibile, altrimenti fallback orario
  if(S_marketOpen!==null)return S_marketOpen;
  // Fallback: orario IT con gestione DST approssimativa
  const now=new Date();
  const it=new Date(now.toLocaleString('en-US',{timeZone:'Europe/Rome'}));
  const day=it.getDay();
  if(day===0||day===6)return false;
  const mins=it.getHours()*60+it.getMinutes();
  // Copre sia estate (15:30-22:00) che inverno (14:30-21:00) con margine
  return mins>=14*60+30 && mins<22*60+15;
}
